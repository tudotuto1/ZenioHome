<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenio Fan — Zenio Home</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
:root {
  --navy: #1A3050;
  --navy-dark: #0F1D32;
  --copper-accent: #B07D62;
  --cream: #F2EFEA;
  --warm-gray: #E8E4DE;
  --mid-gray: #9a9390;
  --light-text: #6b6460;
  --white: #FDFCFB;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--white);
  color: var(--navy-dark);
  font-weight: 300;
}

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(253, 252, 251, 0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--warm-gray);
  padding: 0 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 80px;
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  color: var(--navy-dark);
  text-decoration: none;
}

.nav-logo span {
  color: var(--copper-accent);
  font-style: italic;
}

.nav-links {
  display: flex;
  gap: 36px;
  align-items: center;
  list-style: none;
}

.nav-links a {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--navy);
  text-decoration: none;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--copper-accent);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

#langToggle {
  background: none;
  border: 1px solid var(--warm-gray);
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid-gray);
  padding: 5px 10px;
  border-radius: 2px;
}

.nav-cart {
  position: relative;
  cursor: pointer;
  font-size: 20px;
  color: var(--navy-dark);
  background: none;
  border: none;
}

.cart-badge {
  position: absolute;
  top: -8px;
  right: -10px;
  background: var(--copper-accent);
  color: white;
  font-size: 10px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
}

.page-header {
  background: var(--cream);
  padding: 64px 60px 52px;
  border-bottom: 1px solid var(--warm-gray);
}

.breadcrumb {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mid-gray);
  margin-bottom: 20px;
}

.breadcrumb a {
  color: var(--mid-gray);
  text-decoration: none;
}

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 54px;
  font-weight: 300;
  color: var(--navy-dark);
}

.page-count {
  font-size: 13px;
  color: var(--light-text);
  margin-top: 8px;
}

.catalogue-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 70vh;
}

.sidebar {
  padding: 40px 32px;
  border-right: 1px solid var(--warm-gray);
  background: #fffdfa;
}

.filter-section {
  margin-bottom: 36px;
}

.filter-title {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--warm-gray);
}

.category-pill {
  border: 1px solid var(--warm-gray);
  background: var(--cream);
  padding: 12px 14px;
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--navy-dark);
  display: inline-block;
}

.price-inputs {
  display: flex;
  gap: 10px;
  align-items: center;
}

.price-input {
  width: 74px;
  padding: 8px 10px;
  border: 1px solid var(--warm-gray);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
}

.clear-filters {
  width: 100%;
  background: none;
  border: 1px solid var(--warm-gray);
  padding: 10px;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--light-text);
}

.products-area {
  padding: 32px 40px 64px;
}

.products-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--warm-gray);
}

.search-bar-wrap {
  position: relative;
}

.search-icon-bar {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--mid-gray);
}

.search-bar {
  padding: 10px 16px 10px 40px;
  border: 1px solid var(--warm-gray);
  width: 280px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
}

.toolbar-right {
  display: flex;
  gap: 16px;
  align-items: center;
}

.sort-select {
  padding: 9px 14px;
  border: 1px solid var(--warm-gray);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
}

.grid-toggles {
  display: flex;
  gap: 4px;
}

.grid-toggle {
  background: none;
  border: 1px solid var(--warm-gray);
  width: 36px;
  height: 36px;
  cursor: pointer;
  color: var(--mid-gray);
}

.grid-toggle.active,
.grid-toggle:hover {
  background: var(--navy);
  color: white;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 28px;
}

.products-grid.list-view {
  grid-template-columns: 1fr;
}

.product-card {
  background: var(--white);
  border: 1px solid var(--warm-gray);
  border-radius: 4px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 42px rgba(15, 29, 50, 0.09);
}

.product-card-link {
  text-decoration: none;
  color: inherit;
  display: block;
}

.product-img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--cream);
}

.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-img-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--cream), var(--warm-gray));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
}

.product-info {
  padding: 18px;
}

.product-category {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid-gray);
  margin-bottom: 6px;
}

.product-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  line-height: 1.2;
  color: var(--navy-dark);
  min-height: 52px;
  margin-bottom: 14px;
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.product-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--navy-dark);
}

.old-price {
  font-size: 13px;
  color: var(--mid-gray);
  text-decoration: line-through;
  margin-right: 5px;
}

.add-btn {
  margin: 0 18px 18px;
  width: calc(100% - 36px);
  background: var(--navy);
  border: none;
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 2px;
}

.add-btn:hover {
  background: var(--copper-accent);
}

.products-grid.list-view .product-card {
  display: grid;
  grid-template-columns: 160px 1fr;
}

.products-grid.list-view .add-btn {
  max-width: 180px;
}

.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--warm-gray);
}

.page-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--warm-gray);
  background: none;
  cursor: pointer;
}

.page-btn.active,
.page-btn:hover {
  background: var(--navy);
  color: white;
}

.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 29, 50, 0.5);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
}

.cart-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 420px;
  background: var(--white);
  z-index: 301;
  transform: translateX(100%);
  transition: transform 0.35s;
  display: flex;
  flex-direction: column;
}

.cart-drawer.open {
  transform: translateX(0);
}

.cart-header,
.cart-footer {
  padding: 24px 32px;
  border-bottom: 1px solid var(--warm-gray);
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
}

.cart-close {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--light-text);
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--warm-gray);
}

.cart-item-img {
  width: 72px;
  height: 72px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cart-item-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cart-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
}

.cart-item-price {
  font-size: 14px;
  color: var(--light-text);
}

.cart-item-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.qty-btn {
  border: 1px solid var(--warm-gray);
  background: none;
  width: 26px;
  height: 26px;
  cursor: pointer;
}

.cart-item-remove {
  background: none;
  border: none;
  color: var(--mid-gray);
  cursor: pointer;
  font-size: 12px;
}

.cart-subtotal {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.cart-checkout {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  padding: 16px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--navy-dark);
  color: var(--white);
  padding: 14px 24px;
  border-left: 3px solid var(--copper-accent);
  opacity: 0;
  transform: translateY(8px);
  transition: 0.3s;
  z-index: 400;
  font-size: 13px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.skeleton {
  background: linear-gradient(90deg, var(--warm-gray) 25%, var(--cream) 50%, var(--warm-gray) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

.skeleton-img {
  width: 100%;
  height: 100%;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--light-text);
}

@media (max-width: 1100px) {
  .products-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 900px) {
  nav {
    padding: 0 20px;
  }

  .nav-links {
    gap: 16px;
  }

  .catalogue-layout {
    grid-template-columns: 1fr;
  }

  .sidebar {
    display: none;
  }

  .products-area,
  .page-header {
    padding-left: 20px;
    padding-right: 20px;
  }

  .products-toolbar {
    flex-direction: column;
    align-items: stretch;
    gap: 16px;
  }

  .search-bar {
    width: 100%;
  }

  .products-grid {
    grid-template-columns: 1fr;
  }

  .cart-drawer {
    width: 100%;
  }
}
</style>
</head>

<body>
<nav>
  <a href="index.html" class="nav-logo">Zenio <span>Home</span></a>

  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="catalogue.html" class="active">Catalogue</a></li>
    <li><a href="catalogue.html">Nouveautés</a></li>
    <li><a href="index.html#newsletter">Contact</a></li>
  </ul>

  <div class="nav-right">
    <button id="langToggle" aria-label="Switch language">EN</button>
    <button class="nav-cart" onclick="toggleCart()" aria-label="Panier">
      🛒 <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</nav>

<header class="page-header">
  <div class="breadcrumb">
    <a href="index.html">Accueil</a> / <span id="breadcrumbCat">Zenio Fan</span>
  </div>
  <h1 class="page-title" id="pageTitle">Zenio Fan</h1>
  <div class="page-count" id="pageCount">…</div>
</header>

<main class="catalogue-layout">
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">Collection</div>
      <span class="category-pill">Zenio Fan</span>
    </div>

    <div class="filter-section">
      <div class="filter-title">Prix</div>
      <div class="price-inputs">
        <input type="number" class="price-input" id="priceMin" placeholder="Min" min="0" onchange="applyFilters()">
        <span>—</span>
        <input type="number" class="price-input" id="priceMax" placeholder="Max" min="0" onchange="applyFilters()">
      </div>
    </div>

    <button class="clear-filters" onclick="clearFilters()">Réinitialiser</button>
  </aside>

  <section class="products-area">
    <div class="products-toolbar">
      <div class="search-bar-wrap">
        <span class="search-icon-bar">⌕</span>
        <input type="text" class="search-bar" id="searchBar" placeholder="Rechercher un produit…" oninput="applyFilters()">
      </div>

      <div class="toolbar-right">
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="featured">Sélection</option>
          <option value="price-asc">Prix croissant</option>
          <option value="price-desc">Prix décroissant</option>
          <option value="name">Nom A–Z</option>
        </select>

        <div class="grid-toggles">
          <button class="grid-toggle active" id="gridBtn" onclick="setView('grid')" title="Grille">⊞</button>
          <button class="grid-toggle" id="listBtn" onclick="setView('list')" title="Liste">☰</button>
        </div>
      </div>
    </div>

    <div class="products-grid" id="productsGrid"></div>
    <div class="pagination" id="pagination"></div>
  </section>
</main>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title">Mon Panier</div>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>

  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p>Your cart is empty.</p>
    </div>
  </div>

  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-subtotal">
      <span>Sous-total</span>
      <span id="cartTotal">0,00 €</span>
    </div>
    <button class="cart-checkout">Checkout</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="translations.js"></script>
<script src="script.js"></script>
</body>
</html>
