<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenio Fan — Zenio Home</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
:root {
  --navy: #1A3050;
  --navy-dark: #0F1D32;
  --copper-accent: #B07D62;
  --cream: #F2EFEA;
  --warm-gray: #E8E4DE;
  --mid-gray: #9a9390;
  --light-text: #6b6460;
  --white: #FDFCFB;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--white);
  color: var(--navy-dark);
  font-weight: 300;
}

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(253, 252, 251, 0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--warm-gray);
  padding: 0 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 80px;
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  color: var(--navy-dark);
  text-decoration: none;
}

.nav-logo span {
  color: var(--copper-accent);
  font-style: italic;
}

.nav-links {
  display: flex;
  gap: 36px;
  align-items: center;
  list-style: none;
}

.nav-links a {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--navy);
  text-decoration: none;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--copper-accent);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

#langToggle {
  background: none;
  border: 1px solid var(--warm-gray);
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid-gray);
  padding: 5px 10px;
  border-radius: 2px;
}

.nav-cart {
  position: relative;
  cursor: pointer;
  font-size: 20px;
  color: var(--navy-dark);
  background: none;
  border: none;
}

.cart-badge {
  position: absolute;
  top: -8px;
  right: -10px;
  background: var(--copper-accent);
  color: white;
  font-size: 10px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
}

.page-header {
  background: var(--cream);
  padding: 64px 60px 52px;
  border-bottom: 1px solid var(--warm-gray);
}

.breadcrumb {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mid-gray);
  margin-bottom: 20px;
}

.breadcrumb a {
  color: var(--mid-gray);
  text-decoration: none;
}

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 54px;
  font-weight: 300;
  color: var(--navy-dark);
}

.page-count {
  font-size: 13px;
  color: var(--light-text);
  margin-top: 8px;
}

.catalogue-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 70vh;
}

.sidebar {
  padding: 40px 32px;
  border-right: 1px solid var(--warm-gray);
  background: #fffdfa;
}

.filter-section {
  margin-bottom: 36px;
}

.filter-title {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--warm-gray);
}

.category-pill {
  border: 1px solid var(--warm-gray);
  background: var(--cream);
  padding: 12px 14px;
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--navy-dark);
  display: inline-block;
}

.price-inputs {
  display: flex;
  gap: 10px;
  align-items: center;
}

.price-input {
  width: 74px;
  padding: 8px 10px;
  border: 1px solid var(--warm-gray);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
}

.clear-filters {
  width: 100%;
  background: none;
  border: 1px solid var(--warm-gray);
  padding: 10px;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--light-text);
}

.products-area {
  padding: 32px 40px 64px;
}

.products-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--warm-gray);
}

.search-bar-wrap {
  position: relative;
}

.search-icon-bar {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--mid-gray);
}

.search-bar {
  padding: 10px 16px 10px 40px;
  border: 1px solid var(--warm-gray);
  width: 280px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
}

.toolbar-right {
  display: flex;
  gap: 16px;
  align-items: center;
}

.sort-select {
  padding: 9px 14px;
  border: 1px solid var(--warm-gray);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
}

.grid-toggles {
  display: flex;
  gap: 4px;
}

.grid-toggle {
  background: none;
  border: 1px solid var(--warm-gray);
  width: 36px;
  height: 36px;
  cursor: pointer;
  color: var(--mid-gray);
}

.grid-toggle.active,
.grid-toggle:hover {
  background: var(--navy);
  color: white;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 28px;
}

.products-grid.list-view {
  grid-template-columns: 1fr;
}

.product-card {
  background: var(--white);
  border: 1px solid var(--warm-gray);
  border-radius: 4px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 42px rgba(15, 29, 50, 0.09);
}

.product-card-link {
  text-decoration: none;
  color: inherit;
  display: block;
}

.product-img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--cream);
}

.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-img-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--cream), var(--warm-gray));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
}

.product-info {
  padding: 18px;
}

.product-category {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid-gray);
  margin-bottom: 6px;
}

.product-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  line-height: 1.2;
  color: var(--navy-dark);
  min-height: 52px;
  margin-bottom: 14px;
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.product-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--navy-dark);
}

.old-price {
  font-size: 13px;
  color: var(--mid-gray);
  text-decoration: line-through;
  margin-right: 5px;
}

.add-btn {
  margin: 0 18px 18px;
  width: calc(100% - 36px);
  background: var(--navy);
  border: none;
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 2px;
}

.add-btn:hover {
  background: var(--copper-accent);
}

.products-grid.list-view .product-card {
  display: grid;
  grid-template-columns: 160px 1fr;
}

.products-grid.list-view .add-btn {
  max-width: 180px;
}

.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--warm-gray);
}

.page-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--warm-gray);
  background: none;
  cursor: pointer;
}

.page-btn.active,
.page-btn:hover {
  background: var(--navy);
  color: white;
}

.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 29, 50, 0.5);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
}

.cart-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 420px;
  background: var(--white);
  z-index: 301;
  transform: translateX(100%);
  transition: transform 0.35s;
  display: flex;
  flex-direction: column;
}

.cart-drawer.open {
  transform: translateX(0);
}

.cart-header,
.cart-footer {
  padding: 24px 32px;
  border-bottom: 1px solid var(--warm-gray);
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
}

.cart-close {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--light-text);
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--warm-gray);
}

.cart-item-img {
  width: 72px;
  height: 72px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cart-item-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cart-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
}

.cart-item-price {
  font-size: 14px;
  color: var(--light-text);
}

.cart-item-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.qty-btn {
  border: 1px solid var(--warm-gray);
  background: none;
  width: 26px;
  height: 26px;
  cursor: pointer;
}

.cart-item-remove {
  background: none;
  border: none;
  color: var(--mid-gray);
  cursor: pointer;
  font-size: 12px;
}

.cart-subtotal {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.cart-checkout {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  padding: 16px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--navy-dark);
  color: var(--white);
  padding: 14px 24px;
  border-left: 3px solid var(--copper-accent);
  opacity: 0;
  transform: translateY(8px);
  transition: 0.3s;
  z-index: 400;
  font-size: 13px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.skeleton {
  background: linear-gradient(90deg, var(--warm-gray) 25%, var(--cream) 50%, var(--warm-gray) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

.skeleton-img {
  width: 100%;
  height: 100%;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--light-text);
}

@media (max-width: 1100px) {
  .products-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 900px) {
  nav {
    padding: 0 20px;
  }

  .nav-links {
    gap: 16px;
  }

  .catalogue-layout {
    grid-template-columns: 1fr;
  }

  .sidebar {
    display: none;
  }

  .products-area,
  .page-header {
    padding-left: 20px;
    padding-right: 20px;
  }

  .products-toolbar {
    flex-direction: column;
    align-items: stretch;
    gap: 16px;
  }

  .search-bar {
    width: 100%;
  }

  .products-grid {
    grid-template-columns: 1fr;
  }

  .cart-drawer {
    width: 100%;
  }
}
</style>
</head>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="translations.js"></script>
<script>
(function initSupabase() {
  const cfg = window.ZENIO_CONFIG || {};
  const url = cfg.supabaseUrl;
  const key = cfg.supabaseKey;

  if (!url || !key || url.includes('__SUPABASE_URL__') || key.includes('__SUPABASE_KEY__')) {
    console.warn('[Zenio] Supabase credentials missing.');
    window.ZENIO_SUPABASE = null;
    return;
  }

  window.ZENIO_SUPABASE = supabase.createClient(url, key);
})();

window.ZENIO_PRODUCTS = [];

let cart = JSON.parse(localStorage.getItem('zenio_cart') || '[]');

function escapeHTML(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function escapeAttr(value) {
  return escapeHTML(value).replaceAll('`', '&#096;');
}

function formatPrice(price) {
  return `$${Number(price || 0).toFixed(2)}`;
}

function normalizeProduct(product) {
  const images = Array.isArray(product.images)
    ? product.images.filter(Boolean)
    : product.image_url
      ? [product.image_url]
      : [];

  return {
    id: Number(product.id),
    name: product.name || 'Zenio Fan Product',
    cat: product.category || 'Zenio Fan',
    catSlug: 'zenio-fan',
    price: Number(product.price || 0),
    oldPrice: product.old_price ? Number(product.old_price) : null,
    tag: product.tag || null,
    emoji: product.emoji || '❄️',
    desc: product.description || '',
    isNew: Boolean(product.is_new),
    images,
    imageUrl: images[0] || null,
    inStock: product.in_stock !== false
  };
}

async function fetchProducts() {
  if (!window.ZENIO_SUPABASE) {
    return [];
  }

  const { data, error } = await window.ZENIO_SUPABASE
    .from('products')
    .select('*')
    .order('id', { ascending: true });

  if (error) {
    console.error('[Zenio] Supabase fetch error:', error.message);
    return [];
  }

  return data.map(normalizeProduct);
}

async function fetchProductById(id) {
  if (!window.ZENIO_SUPABASE) return null;

  const { data, error } = await window.ZENIO_SUPABASE
    .from('products')
    .select('*')
    .eq('id', Number(id))
    .single();

  if (error) {
    console.error('[Zenio] Product fetch error:', error.message);
    return null;
  }

  return normalizeProduct(data);
}

function saveCart() {
  localStorage.setItem('zenio_cart', JSON.stringify(cart));
}

function showSkeleton() {
  const grid = document.getElementById('productsGrid');
  grid.className = 'products-grid';

  grid.innerHTML = Array.from({ length: 6 }, () => `
    <div class="product-card skeleton-card">
      <div class="product-img-wrap">
        <div class="skeleton skeleton-img"></div>
      </div>
      <div class="product-info">
        <div class="skeleton skeleton-line" style="width:45%;height:10px;margin-bottom:10px"></div>
        <div class="skeleton skeleton-line" style="width:75%;height:18px;margin-bottom:16px"></div>
        <div class="skeleton skeleton-line" style="width:35%;height:16px"></div>
      </div>
    </div>
  `).join('');
}

const ITEMS_PER_PAGE = 12;
let ALL_PRODUCTS = [];
let currentPage = 1;
let viewMode = 'grid';

function getFilteredProducts() {
  const query = (document.getElementById('searchBar')?.value || '').toLowerCase();
  const minPrice = parseFloat(document.getElementById('priceMin')?.value) || 0;
  const maxPrice = parseFloat(document.getElementById('priceMax')?.value) || Infinity;
  const sort = document.getElementById('sortSelect')?.value || 'featured';

  let products = ALL_PRODUCTS.filter(product => {
    const searchable = `${product.name} ${product.cat}`.toLowerCase();

    if (query && !searchable.includes(query)) return false;
    if (product.price < minPrice || product.price > maxPrice) return false;
    if (product.inStock === false) return false;

    return true;
  });

  if (sort === 'price-asc') products.sort((a, b) => a.price - b.price);
  else if (sort === 'price-desc') products.sort((a, b) => b.price - a.price);
  else if (sort === 'name') products.sort((a, b) => a.name.localeCompare(b.name));
  else products.sort((a, b) => a.id - b.id);

  return products;
}

function productCardHTML(product) {
  const image = product.images?.[0] || product.imageUrl;

  const imageElement = image
    ? `<img src="${escapeAttr(image)}" alt="${escapeAttr(product.name)}" loading="lazy">`
    : `<div class="product-img-placeholder">${escapeHTML(product.emoji || '❄️')}</div>`;

  return `
    <article class="product-card" data-product-id="${product.id}">
      <a class="product-card-link" href="produit.html?id=${encodeURIComponent(product.id)}">
        <div class="product-img-wrap">
          ${imageElement}
        </div>

        <div class="product-info">
          <div class="product-category">${escapeHTML(product.cat || 'Zenio Fan')}</div>
          <h3 class="product-name">${escapeHTML(product.name)}</h3>

          <div class="product-footer">
            <div class="product-price">
              ${product.oldPrice ? `<span class="old-price">${formatPrice(product.oldPrice)}</span>` : ''}
              ${formatPrice(product.price)}
            </div>
          </div>
        </div>
      </a>

      <button class="add-btn" onclick="event.stopPropagation();addToCart(${Number(product.id)})">
        + Cart
      </button>
    </article>
  `;
}

function renderProducts() {
  const products = getFilteredProducts();
  const total = products.length;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const page = products.slice(start, start + ITEMS_PER_PAGE);

  const countEl = document.getElementById('pageCount');
  if (countEl) countEl.textContent = `${total} products`;

  const grid = document.getElementById('productsGrid');
  grid.className = 'products-grid' + (viewMode === 'list' ? ' list-view' : '');

  if (!page.length) {
    grid.innerHTML = `
      <div class="no-results" style="grid-column:1/-1">
        <div class="no-results-icon">🔍</div>
        <p>No products found.</p>
      </div>
    `;
  } else {
    grid.innerHTML = page.map(productCardHTML).join('');
  }

  const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
  const paginationElement = document.getElementById('pagination');

  if (paginationElement) {
    if (totalPages <= 1) {
      paginationElement.innerHTML = '';
      return;
    }

    let buttons = '';

    if (currentPage > 1) {
      buttons += `<button class="page-btn" onclick="goPage(${currentPage - 1})">‹</button>`;
    }

    for (let i = 1; i <= totalPages; i++) {
      buttons += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }

    if (currentPage < totalPages) {
      buttons += `<button class="page-btn" onclick="goPage(${currentPage + 1})">›</button>`;
    }

    paginationElement.innerHTML = buttons;
  }
}

window.applyFilters = function() {
  currentPage = 1;
  renderProducts();
};

window.clearFilters = function() {
  const minInput = document.getElementById('priceMin');
  const maxInput = document.getElementById('priceMax');
  const searchInput = document.getElementById('searchBar');

  if (minInput) minInput.value = '';
  if (maxInput) maxInput.value = '';
  if (searchInput) searchInput.value = '';

  applyFilters();
};

window.goPage = function(page) {
  currentPage = page;
  renderProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.setView = function(view) {
  viewMode = view;
  document.getElementById('gridBtn')?.classList.toggle('active', view === 'grid');
  document.getElementById('listBtn')?.classList.toggle('active', view === 'list');
  renderProducts();
};

window.addToCart = async function(productId) {
  const id = Number(productId);
  let product = ALL_PRODUCTS.find(item => Number(item.id) === id);

  if (!product) product = await fetchProductById(id);
  if (!product) return;

  const existing = cart.find(item => Number(item.id) === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  saveCart();
  updateCartUI();
  showToast(`${product.name} added to cart`);
};

window.removeFromCart = function(id) {
  cart = cart.filter(item => Number(item.id) !== Number(id));
  saveCart();
  updateCartUI();
};

window.changeQty = function(id, delta) {
  const item = cart.find(product => Number(product.id) === Number(id));
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    removeFromCart(id);
  } else {
    saveCart();
    updateCartUI();
  }
};

function updateCartUI() {
  const total = cart.reduce((sum, item) => sum + Number(item.price) * Number(item.qty), 0);
  const count = cart.reduce((sum, item) => sum + Number(item.qty), 0);

  const badge = document.getElementById('cartBadge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }

  const itemsElement = document.getElementById('cartItems');
  const footerElement = document.getElementById('cartFooter');
  const totalElement = document.getElementById('cartTotal');

  if (!itemsElement) return;

  if (!cart.length) {
    itemsElement.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <p>Your cart is empty.</p>
      </div>
    `;

    if (footerElement) footerElement.style.display = 'none';
    return;
  }

  itemsElement.innerHTML = cart.map(item => {
    const image = item.images?.[0] || item.imageUrl;

    return `
      <div class="cart-item">
        <div class="cart-item-img">
          ${image ? `<img src="${escapeAttr(image)}" alt="${escapeAttr(item.name)}">` : escapeHTML(item.emoji || '❄️')}
        </div>

        <div class="cart-item-info">
          <div class="cart-item-name">${escapeHTML(item.name)}</div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>

          <div class="cart-item-controls">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  if (totalElement) totalElement.textContent = formatPrice(total);
  if (footerElement) footerElement.style.display = 'block';
}

window.toggleCart = function() {
  document.getElementById('cartDrawer')?.classList.toggle('open');
  document.getElementById('cartOverlay')?.classList.toggle('open');
};

window.showToast = function(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;

  toast.textContent = message;
  toast.classList.add('show');

  setTimeout(() => toast.classList.remove('show'), 2800);
};

async function initCatalogue() {
  const pageTitle = document.getElementById('pageTitle');
  const breadcrumbCategory = document.getElementById('breadcrumbCat');

  if (pageTitle) pageTitle.textContent = 'Zenio Fan';
  if (breadcrumbCategory) breadcrumbCategory.textContent = 'Zenio Fan';

  showSkeleton();

  try {
    ALL_PRODUCTS = await fetchProducts();
    window.ZENIO_PRODUCTS = ALL_PRODUCTS;
  } catch (error) {
    console.error('[Zenio] fetchProducts error:', error);
    ALL_PRODUCTS = [];
    window.ZENIO_PRODUCTS = ALL_PRODUCTS;
  }

  renderProducts();
  updateCartUI();
}

document.addEventListener('DOMContentLoaded', initCatalogue);
</script>
</body>
</html>
