<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue — Zenio Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Supabase JS SDK v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --navy: #1A3050; --navy-dark: #0F1D32; --navy-light: #2C4B78;
  --copper-accent: #B07D62; --copper-pale: #F0E6E0;
  --cream: #F2EFEA; --warm-gray: #E8E4DE;
  --mid-gray: #9a9390; --light-text: #6b6460; --white: #FDFCFB;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: var(--white); color: var(--navy-dark); font-weight: 300; overflow-x: hidden; }
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(253,252,251,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--warm-gray);
  padding: 0 60px; display: flex; align-items: center; justify-content: space-between; height: 80px;
}
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--navy-dark); text-decoration: none; }
.nav-logo span { color: var(--copper-accent); font-style: italic; }
.nav-links { display: flex; gap: 36px; align-items: center; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--navy); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--copper-accent); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-cart { position: relative; cursor: pointer; font-size: 20px; text-decoration: none; color: var(--navy-dark); background: none; border: none; }
.cart-badge { position: absolute; top: -8px; right: -10px; background: var(--copper-accent); color: white; font-size: 10px; font-family: 'Jost', sans-serif; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
.page-header { background: var(--cream); padding: 60px 60px 48px; border-bottom: 1px solid var(--warm-gray); }
.breadcrumb { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 20px; }
.breadcrumb a { color: var(--mid-gray); text-decoration: none; }
.breadcrumb a:hover { color: var(--copper-accent); }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: var(--navy-dark); margin-bottom: 8px; }
.page-count { font-size: 13px; color: var(--light-text); }
.catalogue-layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; align-items: start; }
.sidebar { padding: 40px 32px; border-right: 1px solid var(--warm-gray); position: sticky; top: 80px; max-height: calc(100vh - 80px); overflow-y: auto; }
.filter-section { margin-bottom: 36px; }
.filter-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--navy-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--warm-gray); }
.filter-options { display: flex; flex-direction: column; gap: 10px; }
.filter-option { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: color 0.2s; }
.filter-option:hover { color: var(--copper-accent); }
.filter-option input[type="checkbox"] { accent-color: var(--copper-accent); cursor: pointer; }
.filter-option label { font-size: 13px; cursor: pointer; }
.filter-count { font-size: 11px; color: var(--mid-gray); margin-left: auto; }
.price-range-wrap { padding: 8px 0; }
.price-inputs { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
.price-input { width: 80px; padding: 8px 10px; border: 1px solid var(--warm-gray); border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 13px; color: var(--navy-dark); outline: none; }
.price-sep { color: var(--mid-gray); font-size: 13px; }
.clear-filters { width: 100%; background: none; border: 1px solid var(--warm-gray); padding: 10px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--light-text); border-radius: 2px; transition: all 0.2s; }
.clear-filters:hover { border-color: var(--navy); color: var(--navy); }
.products-area { padding: 32px 40px; }
.products-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--warm-gray); }
.search-bar-wrap { position: relative; }
.search-bar { padding: 10px 16px 10px 40px; border: 1px solid var(--warm-gray); border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 13px; width: 260px; outline: none; color: var(--navy-dark); transition: border-color 0.2s; }
.search-bar:focus { border-color: var(--navy); }
.search-icon-bar { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--mid-gray); font-size: 14px; }
.toolbar-right { display: flex; align-items: center; gap: 16px; }
.sort-select { padding: 9px 14px; border: 1px solid var(--warm-gray); border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 12px; color: var(--navy-dark); outline: none; cursor: pointer; letter-spacing: 0.06em; }
.grid-toggles { display: flex; gap: 4px; }
.grid-toggle { background: none; border: 1px solid var(--warm-gray); width: 36px; height: 36px; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--mid-gray); transition: all 0.15s; }
.grid-toggle.active, .grid-toggle:hover { background: var(--navy); border-color: var(--navy); color: white; }
.products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.products-grid.list-view { grid-template-columns: 1fr; gap: 16px; }
.product-card { background: var(--white); border: 1px solid var(--warm-gray); border-radius: 3px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(15,29,50,0.09); }
.product-img-wrap { position: relative; overflow: hidden; aspect-ratio: 1; }
.product-img-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--cream) 0%, var(--warm-gray) 100%); display: flex; align-items: center; justify-content: center; font-size: 56px; transition: transform 0.4s ease; }
.product-card:hover .product-img-placeholder { transform: scale(1.05); }
.product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
.product-card:hover .product-img-wrap img { transform: scale(1.05); }
.product-tag { position: absolute; top: 12px; left: 12px; background: var(--copper-accent); color: white; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 3px 9px; border-radius: 1px; }
.product-wishlist { position: absolute; top: 10px; right: 12px; background: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; opacity: 0; transition: opacity 0.2s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.product-card:hover .product-wishlist { opacity: 1; }
.product-info { padding: 18px; }
.product-category { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 5px; }
.product-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--navy-dark); margin-bottom: 4px; line-height: 1.3; }
.product-desc-short { font-size: 12px; color: var(--light-text); line-height: 1.6; margin-bottom: 14px; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--navy-dark); }
.product-price .old-price { font-size: 13px; color: var(--mid-gray); text-decoration: line-through; margin-right: 5px; }
.add-btn { background: var(--navy); border: none; color: var(--white); font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
.add-btn:hover { background: var(--copper-accent); }
.products-grid.list-view .product-card { display: grid; grid-template-columns: 120px 1fr; gap: 0; }
.products-grid.list-view .product-img-wrap { aspect-ratio: 1; }
.products-grid.list-view .product-info { padding: 20px 24px; display: flex; flex-direction: column; justify-content: center; }
.active-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.active-filter-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--cream); border: 1px solid var(--warm-gray); padding: 5px 12px; border-radius: 2px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--navy-dark); }
.active-filter-tag button { background: none; border: none; cursor: pointer; color: var(--mid-gray); font-size: 13px; line-height: 1; transition: color 0.15s; }
.active-filter-tag button:hover { color: #c0392b; }
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--warm-gray); }
.page-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--warm-gray); border-radius: 2px; font-size: 13px; cursor: pointer; background: none; color: var(--navy-dark); transition: all 0.15s; }
.page-btn:hover, .page-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
.cart-overlay { position: fixed; inset: 0; background: rgba(15,29,50,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; background: var(--white); z-index: 301; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
.cart-drawer.open { transform: translateX(0); }
.cart-header { padding: 32px 32px 24px; border-bottom: 1px solid var(--warm-gray); display: flex; align-items: center; justify-content: space-between; }
.cart-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; }
.cart-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--mid-gray); transition: color 0.2s; }
.cart-close:hover { color: var(--navy-dark); }
.cart-items { flex: 1; overflow-y: auto; padding: 24px 32px; }
.cart-empty { text-align: center; padding: 60px 20px; color: var(--light-text); }
.cart-empty-icon { font-size: 48px; margin-bottom: 16px; }
.cart-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--warm-gray); }
.cart-item-img { width: 72px; height: 72px; background: var(--cream); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; margin-bottom: 4px; }
.cart-item-price { font-size: 14px; color: var(--light-text); }
.cart-item-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.qty-btn { background: none; border: 1px solid var(--warm-gray); width: 26px; height: 26px; border-radius: 2px; cursor: pointer; font-size: 16px; color: var(--navy-dark); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.qty-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
.qty-num { font-size: 14px; min-width: 20px; text-align: center; }
.cart-item-remove { background: none; border: none; color: var(--mid-gray); cursor: pointer; font-size: 12px; margin-left: auto; transition: color 0.2s; }
.cart-item-remove:hover { color: #c0392b; }
.cart-footer { padding: 24px 32px 32px; border-top: 1px solid var(--warm-gray); }
.cart-subtotal { display: flex; justify-content: space-between; margin-bottom: 20px; }
.cart-subtotal span:first-child { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--light-text); }
.cart-subtotal span:last-child { font-family: 'Cormorant Garamond', serif; font-size: 22px; }
.cart-checkout { width: 100%; background: var(--navy); color: white; border: none; padding: 16px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
.cart-checkout:hover { background: var(--copper-accent); }
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--navy-dark); color: var(--white); padding: 14px 24px; border-left: 3px solid var(--copper-accent); opacity: 0; transform: translateY(8px); transition: 0.3s; z-index: 400; font-size: 13px; }
.toast.show { opacity: 1; transform: translateY(0); }
.no-results { text-align: center; padding: 80px 20px; color: var(--light-text); }
.no-results-icon { font-size: 48px; margin-bottom: 16px; }

/* ── Skeleton loading ── */
.skeleton { background: linear-gradient(90deg, var(--warm-gray) 25%, var(--cream) 50%, var(--warm-gray) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 2px; }
.skeleton-img { width: 100%; height: 100%; aspect-ratio: 1; }
.skeleton-line { display: block; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
/* ── Lang toggle ── */
#langToggle { background: none; border: 1px solid var(--warm-gray); cursor: pointer; font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid-gray); padding: 5px 10px; border-radius: 2px; transition: all 0.2s; }
#langToggle:hover { border-color: var(--navy); color: var(--navy); }

@media (max-width: 1100px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) {
  nav { padding: 0 20px; }
  .catalogue-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--warm-gray); display: none; }
  .sidebar.mobile-open { display: block; }
  .products-area { padding: 24px 20px; }
  .page-header { padding: 40px 20px 32px; }
  .cart-drawer { width: 100%; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Zenio <span>Home</span></a>
  <ul class="nav-links">
    <li><a href="index.html" data-i18n="nav_home">Accueil</a></li>
    <li><a href="catalogue.html" class="active" data-i18n="nav_catalogue">Catalogue</a></li>
    <li><a href="catalogue.html?cat=nouveautes" data-i18n="nav_new">Nouveautés</a></li>
    <li><a href="index.html#newsletter" data-i18n="nav_contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <button id="langToggle" aria-label="Switch language">EN</button>
    <button class="nav-cart" onclick="toggleCart()" aria-label="Panier">
      🛒 <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html" data-i18n="nav_home">Accueil</a> / <span id="breadcrumbCat" data-i18n="breadcrumb_catalogue">Catalogue</span></div>
  <div class="page-title" id="pageTitle" data-i18n="page_title_catalogue">Catalogue</div>
  <div class="page-count" id="pageCount">…</div>
</div>

<div class="catalogue-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title" data-i18n="filter_categories">Catégories</div>
      <div class="filter-options">
        <label class="filter-option"><input type="checkbox" name="cat" value="maison-connectee" onchange="applyFilters()"><label data-i18n="cat_maison">Maison Connectée</label><span class="filter-count">84</span></label>
        <label class="filter-option"><input type="checkbox" name="cat" value="eclairage" onchange="applyFilters()"><label data-i18n="cat_eclairage">Éclairage</label><span class="filter-count">42</span></label>
        <label class="filter-option"><input type="checkbox" name="cat" value="bureau" onchange="applyFilters()"><label data-i18n="cat_bureau">Bureau</label><span class="filter-count">51</span></label>
        <label class="filter-option"><input type="checkbox" name="cat" value="bien-etre" onchange="applyFilters()"><label data-i18n="cat_bien_etre">Bien-être</label><span class="filter-count">36</span></label>
        <label class="filter-option"><input type="checkbox" name="cat" value="cuisine" onchange="applyFilters()"><label data-i18n="cat_cuisine">Cuisine Tech</label><span class="filter-count">29</span></label>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title" data-i18n="filter_price">Prix</div>
      <div class="price-range-wrap">
        <div class="price-inputs">
          <input type="number" class="price-input" id="priceMin" placeholder="Min" min="0" onchange="applyFilters()">
          <span class="price-sep">—</span>
          <input type="number" class="price-input" id="priceMax" placeholder="Max" min="0" onchange="applyFilters()">
        </div>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title" data-i18n="filter_dispo">Disponibilité</div>
      <div class="filter-options">
        <label class="filter-option"><input type="checkbox" name="dispo" value="stock" onchange="applyFilters()"><label data-i18n="in_stock">En stock</label></label>
        <label class="filter-option"><input type="checkbox" name="dispo" value="promo" onchange="applyFilters()"><label data-i18n="on_sale">En promotion</label></label>
        <label class="filter-option"><input type="checkbox" name="dispo" value="nouveau" onchange="applyFilters()"><label data-i18n="new_arrivals">Nouveautés</label></label>
      </div>
    </div>
    <button class="clear-filters" onclick="clearFilters()" data-i18n="clear_filters">Réinitialiser les filtres</button>
  </aside>

  <!-- PRODUCTS -->
  <div class="products-area">
    <div class="products-toolbar">
      <div class="search-bar-wrap">
        <span class="search-icon-bar">⌕</span>
        <input type="text" class="search-bar" id="searchBar" placeholder="Rechercher un produit…" oninput="applyFilters()" data-i18n-ph="search_placeholder">
      </div>
      <div class="toolbar-right">
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="featured" data-i18n="sort_featured">Sélection</option>
          <option value="price-asc" data-i18n="sort_price_asc">Prix croissant</option>
          <option value="price-desc" data-i18n="sort_price_desc">Prix décroissant</option>
          <option value="name" data-i18n="sort_name">Nom A–Z</option>
          <option value="newest" data-i18n="sort_newest">Nouveautés</option>
        </select>
        <div class="grid-toggles">
          <button class="grid-toggle active" id="gridBtn" onclick="setView('grid')" title="Grille">⊞</button>
          <button class="grid-toggle" id="listBtn" onclick="setView('list')" title="Liste">☰</button>
        </div>
      </div>
    </div>

    <div class="active-filters" id="activeFilters"></div>
    <div class="products-grid" id="productsGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title" id="cartTitleLabel" data-i18n="cart_title">Mon Panier</div>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty"><div class="cart-empty-icon">🛒</div><p data-i18n="cart_empty">Votre panier est vide.</p></div>
  </div>
  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-subtotal">
      <span id="subtotalLabel" data-i18n="subtotal">Sous-total</span>
      <span id="cartTotal">0,00 €</span>
    </div>
    <button class="cart-checkout" id="checkoutBtn" onclick="showToast('Redirection vers le paiement…')" data-i18n="checkout">Passer la commande</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="script.js"></script>
</body>
</html>
