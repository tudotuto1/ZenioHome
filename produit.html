<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Zenio Home</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
:root {
  --navy: #142947;
  --navy-dark: #0F1D32;
  --navy-soft: #1A3050;
  --copper: #B07D62;
  --copper-light: #EBD8CF;
  --cream: #F4F0EA;
  --cream-2: #FAF7F2;
  --warm-gray: #E8E1D8;
  --text-muted: #6F6A65;
  --text-soft: #9A9189;
  --green: #138A55;
  --green-soft: #EAF7F0;
  --danger-soft: #FFF3EC;
  --white: #FFFFFF;
  --shadow: 0 24px 70px rgba(15, 29, 50, 0.10);
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--cream-2);
  color: var(--navy-dark);
  font-weight: 300;
  overflow-x: hidden;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input {
  font-family: inherit;
}

/* HEADER */
.site-header {
  position: relative;
  z-index: 100;
  background: rgba(250, 247, 242, 0.96);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--warm-gray);
}

.logo-bar {
  min-height: 84px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 24px 10px;
  border-bottom: 1px solid rgba(232, 225, 216, 0.75);
}

.logo-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.logo-img {
  max-height: 66px;
  width: auto;
  display: block;
}

.logo-fallback {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--navy-dark);
}

.logo-fallback span {
  color: var(--copper);
  font-style: italic;
}

.main-nav {
  height: 70px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 56px;
  background: rgba(255, 255, 255, 0.62);
}

.nav-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--navy-dark);
}

.nav-brand span {
  color: var(--copper);
  font-style: italic;
}

.nav-links {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 38px;
}

.nav-links a {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--navy-soft);
  transition: color 0.2s ease;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--copper);
}

.nav-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 16px;
}

.nav-icon-btn {
  width: 42px;
  height: 42px;
  border: 1px solid var(--warm-gray);
  background: var(--white);
  color: var(--navy-dark);
  cursor: pointer;
  border-radius: 8px;
  display: grid;
  place-items: center;
  font-size: 18px;
  position: relative;
  transition: all 0.2s ease;
}

.nav-icon-btn:hover {
  border-color: var(--copper);
  color: var(--copper);
}

.cart-badge {
  position: absolute;
  top: -7px;
  right: -7px;
  background: var(--copper);
  color: white;
  font-size: 10px;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  display: none;
  align-items: center;
  justify-content: center;
}

/* PAGE */
.page-wrap {
  max-width: 1440px;
  margin: 0 auto;
  padding: 30px 56px 90px;
}

.breadcrumb {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  align-items: center;
  margin-bottom: 28px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-soft);
}

.breadcrumb a:hover {
  color: var(--copper);
}

.product-shell {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(460px, 0.95fr);
  gap: 44px;
  align-items: start;
}

.product-gallery {
  position: sticky;
  top: 24px;
}

.main-image-card {
  background: var(--white);
  border: 1px solid var(--warm-gray);
  border-radius: 26px;
  overflow: hidden;
  box-shadow: var(--shadow);
  aspect-ratio: 1 / 1;
  position: relative;
}

.main-image-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: var(--cream);
}

.image-placeholder {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 30% 20%, rgba(216, 229, 240, 0.9), transparent 38%),
    linear-gradient(145deg, var(--cream), var(--warm-gray));
  font-size: 98px;
}

.gallery-badge {
  position: absolute;
  top: 18px;
  left: 18px;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid var(--warm-gray);
  color: var(--navy-dark);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.thumbnail-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 16px;
}

.thumb-btn {
  border: 2px solid transparent;
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  aspect-ratio: 1 / 1;
  cursor: pointer;
  padding: 0;
  transition: all 0.2s ease;
}

.thumb-btn.active {
  border-color: var(--navy);
  box-shadow: 0 8px 24px rgba(15, 29, 50, 0.12);
}

.thumb-btn:hover {
  border-color: var(--copper);
  transform: translateY(-2px);
}

.thumb-btn img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* RIGHT COLUMN */
.product-panel {
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid var(--warm-gray);
  border-radius: 28px;
  box-shadow: var(--shadow);
  padding: 34px;
}

.product-category {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--cream);
  color: var(--copper);
  border: 1px solid var(--warm-gray);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.product-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(38px, 4vw, 58px);
  line-height: 0.98;
  font-weight: 400;
  color: var(--navy-dark);
  margin-bottom: 14px;
}

.review-row {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 26px;
}

.stars {
  color: #D79A2B;
  letter-spacing: 2px;
  font-size: 15px;
}

.price-card {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  padding: 22px;
  border: 1px solid var(--warm-gray);
  border-radius: 20px;
  background: linear-gradient(135deg, #fff, var(--cream-2));
  margin-bottom: 18px;
}

.current-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  line-height: 1;
  color: var(--navy-dark);
}

.discount-badge {
  background: var(--danger-soft);
  color: #B35431;
  border: 1px solid #FFD9C7;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.old-price {
  color: var(--text-soft);
  text-decoration: line-through;
  font-size: 17px;
}

.delivery-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid #B7E4C9;
  background: var(--green-soft);
  color: var(--green);
  border-radius: 18px;
  padding: 16px 18px;
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 24px;
}

.delivery-banner span:first-child {
  font-size: 20px;
}

.variant-block {
  margin-bottom: 22px;
}

.variant-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--navy-dark);
  margin-bottom: 12px;
}

.size-guide {
  letter-spacing: 0;
  text-transform: none;
  font-size: 13px;
  font-weight: 400;
  color: var(--copper);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.pill-option {
  border: 1px solid var(--warm-gray);
  background: var(--white);
  color: var(--navy-dark);
  border-radius: 999px;
  padding: 11px 17px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.18s ease;
}

.pill-option:hover,
.pill-option.active {
  border-color: var(--navy);
  background: var(--navy);
  color: var(--white);
}

.color-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  border: 2px solid var(--white);
  outline: 1px solid var(--warm-gray);
  cursor: pointer;
  transition: transform 0.18s ease, outline-color 0.18s ease;
}

.color-swatch:hover,
.color-swatch.active {
  outline-color: var(--navy);
  transform: scale(1.08);
}

.trust-box {
  border: 1px solid #CFE7DA;
  background: linear-gradient(135deg, var(--green-soft), #FFFFFF);
  border-radius: 22px;
  padding: 20px;
  margin: 26px 0;
}

.trust-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--navy-dark);
  margin-bottom: 12px;
}

.trust-list {
  list-style: none;
  display: grid;
  gap: 10px;
}

.trust-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-muted);
  font-size: 14px;
}

.check {
  width: 22px;
  height: 22px;
  border-radius: 999px;
  background: var(--green);
  color: white;
  display: inline-grid;
  place-items: center;
  font-size: 12px;
  flex-shrink: 0;
}

.cta-row {
  display: grid;
  grid-template-columns: 1fr 62px;
  gap: 12px;
  margin-bottom: 10px;
}

.add-to-cart {
  border: none;
  background: var(--navy-dark);
  color: var(--white);
  border-radius: 16px;
  height: 62px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  transition: all 0.2s ease;
  box-shadow: 0 14px 28px rgba(15, 29, 50, 0.18);
}

.add-to-cart:hover {
  background: var(--copper);
  transform: translateY(-1px);
}

.wishlist {
  height: 62px;
  border-radius: 16px;
  border: 1px solid var(--warm-gray);
  background: var(--white);
  color: var(--navy-dark);
  cursor: pointer;
  font-size: 24px;
  transition: all 0.2s ease;
}

.wishlist:hover {
  border-color: var(--copper);
  color: var(--copper);
  transform: translateY(-1px);
}

.urgency {
  color: #B35431;
  background: var(--danger-soft);
  border: 1px solid #FFD9C7;
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 24px;
}

.description-card {
  border-top: 1px solid var(--warm-gray);
  padding-top: 24px;
}

.description-title {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--navy-dark);
  margin-bottom: 12px;
}

.description-text {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.9;
}

/* RELATED */
.related-section {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 56px 90px;
}

.related-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 26px;
  color: var(--copper);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 600;
}

.related-heading::before {
  content: '';
  width: 30px;
  height: 1px;
  background: var(--copper);
}

.related-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  font-weight: 400;
  margin-bottom: 28px;
}

.related-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 22px;
}

.related-card {
  background: var(--white);
  border: 1px solid var(--warm-gray);
  border-radius: 22px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.22s ease;
}

.related-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 44px rgba(15, 29, 50, 0.10);
}

.related-img {
  aspect-ratio: 1 / 1;
  background: var(--cream);
  overflow: hidden;
}

.related-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.related-info {
  padding: 16px;
}

.related-cat {
  color: var(--text-soft);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.related-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  line-height: 1.1;
  min-height: 44px;
  margin-bottom: 12px;
}

.related-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
}

/* CART */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 29, 50, 0.52);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.cart-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 430px;
  max-width: 100%;
  background: var(--white);
  z-index: 301;
  transform: translateX(100%);
  transition: transform 0.34s ease;
  display: flex;
  flex-direction: column;
}

.cart-drawer.open {
  transform: translateX(0);
}

.cart-header {
  padding: 28px 30px;
  border-bottom: 1px solid var(--warm-gray);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cart-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
}

.cart-close {
  background: none;
  border: none;
  color: var(--text-soft);
  cursor: pointer;
  font-size: 24px;
}

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 22px 30px;
}

.cart-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 70px 20px;
}

.cart-empty-icon {
  font-size: 44px;
  margin-bottom: 12px;
}

.cart-item {
  display: flex;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--warm-gray);
}

.cart-item-img {
  width: 76px;
  height: 76px;
  border-radius: 14px;
  background: var(--cream);
  overflow: hidden;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.cart-item-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cart-item-info {
  flex: 1;
}

.cart-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  line-height: 1.1;
  margin-bottom: 4px;
}

.cart-item-price {
  color: var(--text-muted);
  font-size: 13px;
}

.cart-item-controls {
  display: flex;
  gap: 9px;
  align-items: center;
  margin-top: 10px;
}

.qty-btn {
  width: 26px;
  height: 26px;
  border: 1px solid var(--warm-gray);
  background: var(--white);
  border-radius: 8px;
  cursor: pointer;
}

.cart-item-remove {
  margin-left: auto;
  border: none;
  background: none;
  color: var(--text-soft);
  cursor: pointer;
  font-size: 12px;
}

.cart-footer {
  padding: 24px 30px 30px;
  border-top: 1px solid var(--warm-gray);
}

.cart-subtotal {
  display: flex;
  justify-content: space-between;
  margin-bottom: 18px;
}

.cart-checkout {
  width: 100%;
  height: 54px;
  border: none;
  background: var(--navy-dark);
  color: white;
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 12px;
  font-weight: 600;
}

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--navy-dark);
  color: white;
  border-left: 4px solid var(--copper);
  border-radius: 14px;
  padding: 15px 22px;
  z-index: 500;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.loading-state,
.error-state {
  grid-column: 1 / -1;
  background: var(--white);
  border: 1px solid var(--warm-gray);
  border-radius: 24px;
  padding: 70px 30px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  text-align: center;
}

/* RESPONSIVE */
@media (max-width: 1120px) {
  .product-shell {
    grid-template-columns: 1fr;
  }

  .product-gallery {
    position: static;
  }

  .related-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 760px) {
  .main-nav {
    grid-template-columns: 1fr auto;
    padding: 0 20px;
  }

  .nav-brand {
    display: none;
  }

  .nav-links {
    gap: 18px;
  }

  .nav-links a {
    font-size: 10px;
  }

  .logo-img {
    max-height: 54px;
  }

  .page-wrap {
    padding: 22px 18px 60px;
  }

  .product-panel {
    padding: 22px;
    border-radius: 22px;
  }

  .current-price {
    font-size: 36px;
  }

  .cta-row {
    grid-template-columns: 1fr 56px;
  }

  .add-to-cart,
  .wishlist {
    height: 58px;
  }

  .related-section {
    padding: 0 18px 60px;
  }

  .related-grid {
    grid-template-columns: 1fr;
  }

  .thumbnail-row {
    grid-template-columns: repeat(4, 1fr);
  }

  .cart-drawer {
    width: 100%;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="logo-bar">
    <a href="index.html" class="logo-link" aria-label="Zenio Home">
      <img class="logo-img" src="Zenio Home Ethereal Logo" alt="Zenio Home Ethereal Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <span class="logo-fallback" style="display:none;">Zenio <span>Home</span></span>
    </a>
  </div>

  <nav class="main-nav">
    <a href="index.html" class="nav-brand">Zenio <span>Home</span></a>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalogue.html" class="active">Catalogue</a></li>
      <li><a href="catalogue.html">New Arrivals</a></li>
      <li><a href="index.html#newsletter">Contact</a></li>
    </ul>

    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="toggleCart()" aria-label="Open cart">
        🛒
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </nav>
</header>

<main class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span>/</span>
    <a href="catalogue.html">Catalogue</a>
    <span>/</span>
    <span id="breadcrumbName">Product</span>
  </div>

  <section class="product-shell" id="productLayout">
    <div class="loading-state">Loading product…</div>
  </section>
</main>

<section class="related-section">
  <div class="related-heading">Zenio Fan</div>
  <h2 class="related-title">You may also like</h2>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title">Your Cart</div>
    <button class="cart-close" onclick="toggleCart()" aria-label="Close cart">×</button>
  </div>

  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p>Your cart is empty.</p>
    </div>
  </div>

  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <span id="cartTotal">0,00 €</span>
    </div>
    <button class="cart-checkout" onclick="showToast('Checkout coming soon')">Checkout</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script src="config.js"></script>

<script>
(function initSupabase() {
  const cfg = window.ZENIO_CONFIG || {};
  const url = cfg.supabaseUrl;
  const key = cfg.supabaseKey;

  if (!url || !key || url.includes('__SUPABASE_URL__') || key.includes('__SUPABASE_KEY__')) {
    console.warn('[Zenio] Supabase credentials missing.');
    window.ZENIO_SUPABASE = null;
    return;
  }

  window.ZENIO_SUPABASE = supabase.createClient(url, key);
})();

let cart = JSON.parse(localStorage.getItem('zenio_cart') || '[]');
let currentProduct = null;
let allProducts = [];

function saveCart() {
  localStorage.setItem('zenio_cart', JSON.stringify(cart));
}

function escapeHTML(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function escapeAttr(value) {
  return escapeHTML(value).replaceAll('`', '&#096;');
}

function formatPrice(price) {
  return `${Number(price || 0).toFixed(2).replace('.', ',')} €`;
}

function getOriginalPrice(price) {
  const current = Number(price || 0);
  return current > 0 ? current / 0.85 : 0;
}

function normalizeProduct(product) {
  const images = Array.isArray(product.images)
    ? product.images.filter(Boolean)
    : product.image_url
      ? [product.image_url]
      : [];

  return {
    id: Number(product.id),
    name: product.name || 'Zenio Fan Product',
    description: product.description || '',
    price: Number(product.price || 0),
    category: product.category || 'Zenio Fan',
    images,
    imageUrl: images[0] || null
  };
}

async function fetchProductById(id) {
  if (!window.ZENIO_SUPABASE) return null;

  const { data, error } = await window.ZENIO_SUPABASE
    .from('products')
    .select('*')
    .eq('id', Number(id))
    .single();

  if (error) {
    console.error('[Zenio] Product fetch error:', error.message);
    return null;
  }

  return normalizeProduct(data);
}

async function fetchAllProducts() {
  if (!window.ZENIO_SUPABASE) return [];

  const { data, error } = await window.ZENIO_SUPABASE
    .from('products')
    .select('*')
    .order('id', { ascending: true });

  if (error) {
    console.error('[Zenio] Products fetch error:', error.message);
    return [];
  }

  return data.map(normalizeProduct);
}

function productImage(product) {
  const image = product.images?.[0] || product.imageUrl;

  if (!image) {
    return '<div class="image-placeholder">❄️</div>';
  }

  return `<img src="${escapeAttr(image)}" alt="${escapeAttr(product.name)}" loading="lazy">`;
}

function getVariantData(productName) {
  const name = String(productName || '').toLowerCase();

  if (name.includes('neck')) {
    return {
      styles: ['Neck Fan', 'Sport Cooling'],
      colors: [
        { name: 'White', value: '#F7F7F2' },
        { name: 'Mint', value: '#BBDCCD' },
        { name: 'Pink', value: '#F5C7D0' },
        { name: 'Black', value: '#111111' },
        { name: 'Blue', value: '#263B5D' }
      ],
      sizes: ['Standard', 'Adjustable Fit']
    };
  }

  if (name.includes('makeup') || name.includes('mirror')) {
    return {
      styles: ['Charging Model', 'Direct Plug-In'],
      colors: [
        { name: 'White', value: '#F8F6F1' },
        { name: 'Cream', value: '#EDE1D1' }
      ],
      sizes: ['Desk Size', 'Vanity Size']
    };
  }

  if (name.includes('foldable') || name.includes('handheld') || name.includes('pocket')) {
    return {
      styles: ['Portable Fan', 'Travel Fan'],
      colors: [
        { name: 'White', value: '#F7F7F2' },
        { name: 'Pink', value: '#F4B7C3' },
        { name: 'Black', value: '#111111' }
      ],
      sizes: ['Compact', 'Pocket Size']
    };
  }

  return {
    styles: ['Standard', 'Premium Cooling'],
    colors: [
      { name: 'White', value: '#F8F6F1' },
      { name: 'Blue', value: '#85BCE7' },
      { name: 'Black', value: '#111111' }
    ],
    sizes: ['Standard', 'Large Airflow']
  };
}

function renderSwatches(colors) {
  return colors.map((color, index) => `
    <button
      class="color-swatch ${index === 0 ? 'active' : ''}"
      type="button"
      title="${escapeAttr(color.name)}"
      aria-label="${escapeAttr(color.name)}"
      style="background:${escapeAttr(color.value)}"
      onclick="selectOption(this, '.color-swatch')"
    ></button>
  `).join('');
}

function renderPills(values, selectorClass) {
  return values.map((value, index) => `
    <button
      class="pill-option ${selectorClass} ${index === 0 ? 'active' : ''}"
      type="button"
      onclick="selectOption(this, '.${selectorClass}')"
    >
      ${escapeHTML(value)}
    </button>
  `).join('');
}

function renderProduct(product) {
  const layout = document.getElementById('productLayout');
  const breadcrumbName = document.getElementById('breadcrumbName');

  currentProduct = product;

  document.title = `${product.name} — Zenio Home`;
  if (breadcrumbName) breadcrumbName.textContent = product.name;

  const safeName = escapeHTML(product.name);
  const safeCategory = escapeHTML(product.category);
  const safeDescription = escapeHTML(product.description).replace(/\n/g, '<br>');
  const images = product.images && product.images.length ? product.images : [];
  const mainImage = images[0] || product.imageUrl;
  const variants = getVariantData(product.name);
  const oldPrice = getOriginalPrice(product.price);

  layout.innerHTML = `
    <div class="product-gallery">
      <div class="main-image-card">
        <div class="gallery-badge">Zenio Selection</div>
        ${
          mainImage
            ? `<img src="${escapeAttr(mainImage)}" alt="${escapeAttr(product.name)}" id="mainProductImage">`
            : `<div class="image-placeholder">❄️</div>`
        }
      </div>

      <div class="thumbnail-row">
        ${
          images.length
            ? images.slice(0, 5).map((image, index) => `
              <button class="thumb-btn ${index === 0 ? 'active' : ''}" type="button" onclick="setMainProductImage('${escapeAttr(image)}', ${index})">
                <img src="${escapeAttr(image)}" alt="${escapeAttr(product.name)} image ${index + 1}">
              </button>
            `).join('')
            : `
              <button class="thumb-btn active" type="button">
                <div class="image-placeholder" style="font-size:32px;">❄️</div>
              </button>
            `
        }
      </div>
    </div>

    <aside class="product-panel">
      <div class="product-category">❄️ ${safeCategory}</div>

      <h1 class="product-title">${safeName}</h1>

      <div class="review-row">
        <span class="stars">★★★★★</span>
        <span>4.7/5 (428 reviews)</span>
      </div>

      <div class="price-card">
        <div class="current-price">${formatPrice(product.price)}</div>
        <div class="discount-badge">-15%</div>
        <div class="old-price">${formatPrice(oldPrice)}</div>
      </div>

      <div class="delivery-banner">
        <span>🚚</span>
        <span>Fast Delivery: 7 to 9 business days</span>
      </div>

      <div class="variant-block">
        <div class="variant-label">Style</div>
        <div class="pill-row">
          ${renderPills(variants.styles, 'style-option')}
        </div>
      </div>

      <div class="variant-block">
        <div class="variant-label">Color</div>
        <div class="color-row">
          ${renderSwatches(variants.colors)}
        </div>
      </div>

      <div class="variant-block">
        <div class="variant-label">
          <span>Size</span>
          <a class="size-guide" href="#" onclick="event.preventDefault(); showToast('Size guide coming soon')">Size Guide</a>
        </div>
        <div class="pill-row">
          ${renderPills(variants.sizes, 'size-option')}
        </div>
      </div>

      <div class="trust-box">
        <div class="trust-title">Buy with confidence</div>
        <ul class="trust-list">
          <li><span class="check">✓</span> Secure payments</li>
          <li><span class="check">✓</span> Privacy protection</li>
          <li><span class="check">✓</span> Free returns within 30 days</li>
        </ul>
      </div>

      <div class="cta-row">
        <button class="add-to-cart" type="button" onclick="addToCart(${product.id})">ADD TO CART</button>
        <button class="wishlist" type="button" aria-label="Add to wishlist" onclick="showToast('Added to wishlist')">♡</button>
      </div>

      <div class="urgency">Limited stock - Don't miss this offer!</div>

      <div class="description-card">
        <div class="description-title">Product Description</div>
        <div class="description-text">${safeDescription}</div>
      </div>
    </aside>
  `;
}

function renderRelatedProducts(products, currentId) {
  const relatedGrid = document.getElementById('relatedGrid');
  if (!relatedGrid) return;

  const related = products
    .filter(product => Number(product.id) !== Number(currentId))
    .slice(0, 4);

  if (!related.length) {
    relatedGrid.innerHTML = '';
    return;
  }

  relatedGrid.innerHTML = related.map(product => `
    <article class="related-card" onclick="window.location='produit.html?id=${product.id}'">
      <div class="related-img">
        ${productImage(product)}
      </div>
      <div class="related-info">
        <div class="related-cat">${escapeHTML(product.category)}</div>
        <div class="related-name">${escapeHTML(product.name)}</div>
        <div class="related-price">${formatPrice(product.price)}</div>
      </div>
    </article>
  `).join('');
}

window.selectOption = function(button, selector) {
  document.querySelectorAll(selector).forEach(item => item.classList.remove('active'));
  button.classList.add('active');
};

window.setMainProductImage = function(src, activeIndex) {
  const mainImage = document.getElementById('mainProductImage');
  if (mainImage) mainImage.src = src;

  document.querySelectorAll('.thumb-btn').forEach((thumb, index) => {
    thumb.classList.toggle('active', index === activeIndex);
  });
};

window.addToCart = async function(productId) {
  const id = Number(productId);
  let product = allProducts.find(item => Number(item.id) === id);

  if (!product && currentProduct && Number(currentProduct.id) === id) {
    product = currentProduct;
  }

  if (!product) {
    product = await fetchProductById(id);
  }

  if (!product) return;

  const existing = cart.find(item => Number(item.id) === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  saveCart();
  updateCartUI();
  showToast(`${product.name} added to cart`);
};

window.removeFromCart = function(id) {
  cart = cart.filter(item => Number(item.id) !== Number(id));
  saveCart();
  updateCartUI();
};

window.changeQty = function(id, delta) {
  const item = cart.find(product => Number(product.id) === Number(id));
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    removeFromCart(id);
  } else {
    saveCart();
    updateCartUI();
  }
};

function updateCartUI() {
  const total = cart.reduce((sum, item) => sum + Number(item.price) * Number(item.qty), 0);
  const count = cart.reduce((sum, item) => sum + Number(item.qty), 0);

  const badge = document.getElementById('cartBadge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }

  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');
  const totalEl = document.getElementById('cartTotal');

  if (!itemsEl) return;

  if (!cart.length) {
    itemsEl.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <p>Your cart is empty.</p>
      </div>
    `;

    if (footerEl) footerEl.style.display = 'none';
    return;
  }

  itemsEl.innerHTML = cart.map(item => {
    const image = item.images?.[0] || item.imageUrl;

    return `
      <div class="cart-item">
        <div class="cart-item-img">
          ${image ? `<img src="${escapeAttr(image)}" alt="${escapeAttr(item.name)}">` : '❄️'}
        </div>

        <div class="cart-item-info">
          <div class="cart-item-name">${escapeHTML(item.name)}</div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>

          <div class="cart-item-controls">
            <button class="qty-btn" type="button" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" type="button" onclick="changeQty(${item.id}, 1)">+</button>
            <button class="cart-item-remove" type="button" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  if (totalEl) totalEl.textContent = formatPrice(total);
  if (footerEl) footerEl.style.display = 'block';
}

window.toggleCart = function() {
  document.getElementById('cartDrawer')?.classList.toggle('open');
  document.getElementById('cartOverlay')?.classList.toggle('open');
};

window.showToast = function(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;

  toast.textContent = message;
  toast.classList.add('show');

  setTimeout(() => toast.classList.remove('show'), 2800);
};

async function initProductPage() {
  const params = new URLSearchParams(window.location.search);
  const id = Number(params.get('id'));
  const layout = document.getElementById('productLayout');

  if (!id) {
    layout.innerHTML = `<div class="error-state">Product not found.</div>`;
    updateCartUI();
    return;
  }

  const product = await fetchProductById(id);

  if (!product) {
    layout.innerHTML = `<div class="error-state">Product not found.</div>`;
    updateCartUI();
    return;
  }

  allProducts = await fetchAllProducts();

  renderProduct(product);
  renderRelatedProducts(allProducts, product.id);
  updateCartUI();
}

document.addEventListener('DOMContentLoaded', initProductPage);
</script>
</body>
</html>
