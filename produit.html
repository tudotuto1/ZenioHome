<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Zenio Home</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
:root {
  --navy: #1A3050;
  --navy-dark: #0F1D32;
  --navy-light: #2C4B78;
  --ethereal-blue: #D8E5F0;
  --copper-accent: #B07D62;
  --copper-pale: #F0E6E0;
  --cream: #F2EFEA;
  --warm-gray: #E8E4DE;
  --mid-gray: #9a9390;
  --light-text: #6b6460;
  --white: #FDFCFB;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--white);
  color: var(--navy-dark);
  font-weight: 300;
  overflow-x: hidden;
}

/* TOP LOGO BAR */
.logo-bar {
  background: var(--cream);
  border-bottom: 1px solid var(--warm-gray);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px 60px;
  position: relative;
  z-index: 110;
}

.logo-bar img {
  height: 82px;
  width: auto;
  display: block;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(253, 252, 251, 0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--warm-gray);
  padding: 0 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 80px;
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--navy-dark);
  text-decoration: none;
}

.nav-logo span {
  color: var(--copper-accent);
  font-style: italic;
}

.nav-links {
  display: flex;
  gap: 36px;
  align-items: center;
  list-style: none;
}

.nav-links a {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--navy);
  text-decoration: none;
  transition: color 0.2s;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--copper-accent);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 18px;
}

.nav-cart {
  position: relative;
  cursor: pointer;
  font-size: 20px;
  color: var(--navy-dark);
  background: none;
  border: none;
}

.cart-badge {
  position: absolute;
  top: -8px;
  right: -10px;
  background: var(--copper-accent);
  color: white;
  font-size: 10px;
  font-family: 'Jost', sans-serif;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
}

/* BREADCRUMB */
.breadcrumb-bar {
  padding: 20px 60px;
  border-bottom: 1px solid var(--warm-gray);
  background: var(--cream);
  position: relative;
  z-index: 1;
}

.breadcrumb {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid-gray);
}

.breadcrumb a {
  color: var(--mid-gray);
  text-decoration: none;
  transition: color 0.2s;
}

.breadcrumb a:hover {
  color: var(--copper-accent);
}

.breadcrumb span {
  color: var(--navy-dark);
}

/* PRODUCT LAYOUT */
.product-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  max-width: 1440px;
  margin: 0 auto;
  min-height: 720px;
}

.product-gallery {
  padding: 60px;
  position: relative;
  z-index: 1;
}

.main-img-wrap {
  position: relative;
  aspect-ratio: 1;
  margin-bottom: 16px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--cream);
  border: 1px solid var(--warm-gray);
}

.main-img-wrap img,
.main-img-placeholder {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.main-img-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 96px;
  background: linear-gradient(135deg, var(--cream), var(--warm-gray));
}

.gallery-thumbnails {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.thumb {
  width: 82px;
  height: 82px;
  border-radius: 3px;
  overflow: hidden;
  border: 2px solid transparent;
  cursor: pointer;
  background: var(--cream);
  padding: 0;
}

.thumb.active {
  border-color: var(--navy);
}

.thumb:hover {
  border-color: var(--copper-accent);
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* PRODUCT INFO */
.product-info-panel {
  padding: 60px 60px 60px 48px;
  border-left: 1px solid var(--warm-gray);
}

.product-cat-label {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--copper-accent);
  margin-bottom: 12px;
}

.product-name-large {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(34px, 3.5vw, 50px);
  font-weight: 300;
  color: var(--navy-dark);
  line-height: 1.08;
  margin-bottom: 24px;
}

.price-block {
  margin-bottom: 28px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--warm-gray);
}

.price-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  color: var(--navy-dark);
}

.product-short-desc {
  font-size: 14px;
  line-height: 1.9;
  color: var(--light-text);
  margin-bottom: 28px;
}

.add-to-cart-block {
  margin-bottom: 24px;
}

.btn-add-cart {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  padding: 17px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.25s;
}

.btn-add-cart:hover {
  background: var(--copper-accent);
}

/* TRUST BADGES */
.delivery-info {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
  padding: 20px;
  background: var(--cream);
  border-radius: 4px;
  border: 1px solid var(--warm-gray);
}

.delivery-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--light-text);
}

.delivery-icon {
  font-size: 16px;
}

/* ACCORDION */
.accordion {
  border-top: 1px solid var(--warm-gray);
}

.accordion-item {
  border-bottom: 1px solid var(--warm-gray);
}

.accordion-btn {
  width: 100%;
  background: none;
  border: none;
  padding: 18px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--navy-dark);
  transition: color 0.2s;
}

.accordion-btn:hover {
  color: var(--copper-accent);
}

.accordion-btn .icon {
  font-size: 18px;
  transition: transform 0.25s;
}

.accordion-btn.open .icon {
  transform: rotate(45deg);
}

.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.accordion-body-inner {
  padding: 0 0 20px;
  font-size: 13px;
  line-height: 1.9;
  color: var(--light-text);
}

/* RELATED */
.related-section {
  padding: 80px 60px;
  background: var(--cream);
  border-top: 1px solid var(--warm-gray);
}

.section-eyebrow {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--copper-accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-eyebrow::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--copper-accent);
  display: block;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 300;
  color: var(--navy-dark);
  margin-bottom: 40px;
}

.related-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.product-card {
  background: var(--white);
  border: 1px solid var(--warm-gray);
  border-radius: 3px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(15, 29, 50, 0.09);
}

.product-img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--cream);
}

.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-img-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--cream), var(--warm-gray));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.product-info {
  padding: 16px;
}

.product-category {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--mid-gray);
  margin-bottom: 4px;
}

.product-name-sm {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  color: var(--navy-dark);
  margin-bottom: 10px;
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.product-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  color: var(--navy-dark);
}

.add-btn {
  background: var(--navy);
  border: none;
  color: white;
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 7px 14px;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
}

.add-btn:hover {
  background: var(--copper-accent);
}

/* CART DRAWER */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 29, 50, 0.5);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.cart-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 420px;
  background: var(--white);
  z-index: 301;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
}

.cart-drawer.open {
  transform: translateX(0);
}

.cart-header {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--warm-gray);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cart-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 300;
}

.cart-close {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--mid-gray);
}

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--light-text);
}

.cart-empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--warm-gray);
}

.cart-item-img {
  width: 72px;
  height: 72px;
  background: var(--cream);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  overflow: hidden;
}

.cart-item-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cart-item-info {
  flex: 1;
}

.cart-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  margin-bottom: 4px;
}

.cart-item-price {
  font-size: 14px;
  color: var(--light-text);
}

.cart-item-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.qty-btn {
  background: none;
  border: 1px solid var(--warm-gray);
  width: 26px;
  height: 26px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 16px;
  color: var(--navy-dark);
  display: flex;
  align-items: center;
  justify-content: center;
}

.qty-num {
  font-size: 14px;
  min-width: 20px;
  text-align: center;
}

.cart-item-remove {
  background: none;
  border: none;
  color: var(--mid-gray);
  cursor: pointer;
  font-size: 12px;
  margin-left: auto;
}

.cart-footer {
  padding: 24px 32px 32px;
  border-top: 1px solid var(--warm-gray);
}

.cart-subtotal {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.cart-subtotal span:first-child {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--light-text);
}

.cart-subtotal span:last-child {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
}

.cart-checkout {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  padding: 16px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
}

.cart-checkout:hover {
  background: var(--copper-accent);
}

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--navy-dark);
  color: var(--white);
  padding: 14px 24px;
  border-left: 3px solid var(--copper-accent);
  opacity: 0;
  transform: translateY(8px);
  transition: 0.3s;
  z-index: 400;
  font-size: 13px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.loading-state,
.error-state {
  grid-column: 1 / -1;
  padding: 80px 60px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  color: var(--navy-dark);
}

@media (max-width: 1000px) {
  .product-layout {
    grid-template-columns: 1fr;
  }

  .product-gallery {
    padding: 32px 20px;
  }

  .product-info-panel {
    padding: 32px 20px;
    border-left: none;
    border-top: 1px solid var(--warm-gray);
  }

  .related-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  nav {
    padding: 0 24px;
  }

  .breadcrumb-bar {
    padding: 16px 24px;
  }
}

@media (max-width: 700px) {
  .logo-bar img {
    height: 58px;
  }

  nav {
    padding: 0 20px;
  }

  .nav-links {
    gap: 14px;
  }

  .nav-links a {
    font-size: 10px;
  }

  .related-section {
    padding: 56px 20px;
  }

  .related-grid {
    grid-template-columns: 1fr;
  }

  .cart-drawer {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="logo-bar">
  <a href="index.html" aria-label="Zenio Home">
    <img src="Zenio Home Ethereal Logo" alt="Zenio Home Ethereal Logo">
  </a>
</div>

<nav>
  <a href="index.html" class="nav-logo">Zenio <span>Home</span></a>

  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="catalogue.html" class="active">Catalogue</a></li>
    <li><a href="catalogue.html">Nouveautés</a></li>
  </ul>

  <div class="nav-right">
    <button class="nav-cart" onclick="toggleCart()" aria-label="Open cart">
      🛒 <span class="cart-badge" id="cartBadge">0</span>

</nav>

<div class="breadcrumb-bar">

<div class="toast" id="toast"></div>

<script src="config.js"></script>

<script>
(function initSupabase() {
  const cfg = window.ZENIO_CONFIG || {};
  const url = cfg.supabaseUrl;
  const key = cfg.supabaseKey;

  if (!url || !key || url.includes('__SUPABASE_URL__') || key.includes('__SUPABASE_KEY__')) {
    console.warn('[Zenio] Supabase credentials missing.');
    window.ZENIO_SUPABASE = null;
    return;
  }

  window.ZENIO_SUPABASE = supabase.createClient(url, key);
})();

let cart = JSON.parse(localStorage.getItem('zenio_cart') || '[]');
let currentProduct = null;
let allProducts = [];

function saveCart() {
  localStorage.setItem('zenio_cart', JSON.stringify(cart));
}

function formatPrice(price) {
  return `${Number(price).toFixed(2).replace('.', ',')} €`;
}

function escapeHTML(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function normalizeProduct(product) {
  const images = Array.isArray(product.images)
    ? product.images
    : product.image_url
      ? [product.image_url]
      : [];

  return {
    id: Number(product.id),
    name: product.name || 'Zenio Fan Product',
    description: product.description || '',
    price: Number(product.price || 0),
    category: product.category || 'Zenio Fan',
    images,
    imageUrl: images[0] || null,
  };
}

async function fetchProductById(id) {
  if (!window.ZENIO_SUPABASE) return null;

  const { data, error } = await window.ZENIO_SUPABASE
    .from('products')
    .select('*')
    .eq('id', Number(id))
    .single();

  if (error) {
    console.error('[Zenio] Product fetch error:', error.message);
    return null;
  }

  return normalizeProduct(data);
}

async function fetchAllProducts() {
  if (!window.ZENIO_SUPABASE) return [];

  const { data, error } = await window.ZENIO_SUPABASE
    .from('products')
    .select('*')
    .order('id', { ascending: true });

  if (error) {
    console.error('[Zenio] Products fetch error:', error.message);
    return [];
  }

  return data.map(normalizeProduct);
}

function imageMarkup(product, className = '') {
  const image = product.images?.[0] || product.imageUrl;

  if (image) {
    return `<img class="${className}" src="${escapeHTML(image)}" alt="${escapeHTML(product.name)}" loading="lazy">`;
  }

  return `<div class="product-img-placeholder">❄️</div>`;
}

function renderProduct(product) {
  const layout = document.getElementById('productLayout');
  const breadcrumbName = document.getElementById('breadcrumbName');

  currentProduct = product;

  document.title = `${product.name} — Zenio Home`;
  if (breadcrumbName) breadcrumbName.textContent = product.name;

  const safeName = escapeHTML(product.name);
  const safeCategory = escapeHTML(product.category);
  const safeDescription = escapeHTML(product.description).replace(/\n/g, '<br>');

  const images = product.images && product.images.length ? product.images : [];
  const mainImage = images[0] || product.imageUrl;

  layout.innerHTML = `
    <div class="product-gallery">
      <div class="main-img-wrap">
        ${
          mainImage
            ? `<img src="${escapeHTML(mainImage)}" alt="${safeName}" id="mainProductImage">`
            : `<div class="main-img-placeholder">❄️</div>`
        }
      </div>

      ${
        images.length > 1
          ? `<div class="gallery-thumbnails">
              ${images.map((img, index) => `
                <button class="thumb ${index === 0 ? 'active' : ''}" type="button" onclick="setMainProductImage('${escapeHTML(img)}', ${index})">
                  <img src="${escapeHTML(img)}" alt="${safeName} image ${index + 1}">
                </button>
              `).join('')}
            </div>`
          : images.length === 1
            ? `<div class="gallery-thumbnails">
                <button class="thumb active" type="button" onclick="setMainProductImage('${escapeHTML(images[0])}', 0)">
                  <img src="${escapeHTML(images[0])}" alt="${safeName} image 1">
                </button>
              </div>`
            : ''
      }
    </div>

    <div class="product-info-panel">
      <div class="product-cat-label">${safeCategory}</div>
      <h1 class="product-name-large">${safeName}</h1>

      <div class="price-block">
        <div class="price-main">${formatPrice(product.price)}</div>
      </div>

      <div class="product-short-desc">${safeDescription}</div>

      <div class="add-to-cart-block">
        <button class="btn-add-cart" type="button" onclick="addToCart(${product.id})">Ajouter au panier</button>
      </div>

      <div class="delivery-info">
        <div class="delivery-row">
          <span class="delivery-icon">🚚</span>
          <span>Delivery: 7 to 9 business days</span>
        </div>
        <div class="delivery-row">
          <span class="delivery-icon">↩️</span>
          <span>Free returns within 30 days</span>
        </div>
        <div class="delivery-row">
          <span class="delivery-icon">🔒</span>
          <span>100% Secure SSL Payment</span>
        </div>
      </div>

      <div class="accordion">
        <div class="accordion-item">
          <button class="accordion-btn open" type="button" onclick="toggleAccordion(this)">
            Product Details <span class="icon">+</span>
          </button>
          <div class="accordion-body" style="max-height: 700px;">
            <div class="accordion-body-inner">${safeDescription}</div>
          </div>
        </div>

        <div class="accordion-item">
          <button class="accordion-btn" type="button" onclick="toggleAccordion(this)">
            Payment Security <span class="icon">+</span>
          </button>
          <div class="accordion-body">
            <div class="accordion-body-inner">
              Your payment is protected through secure checkout technology. Transactions are processed using encrypted systems designed to protect your personal and billing information.
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderRelatedProducts(products, currentId) {
  const relatedGrid = document.getElementById('relatedGrid');
  if (!relatedGrid) return;

  const related = products
    .filter(product => Number(product.id) !== Number(currentId))
    .slice(0, 4);

  if (!related.length) {
    relatedGrid.innerHTML = '';
    return;
  }

  relatedGrid.innerHTML = related.map(product => `
    <article class="product-card" onclick="window.location='produit.html?id=${product.id}'">
      <div class="product-img-wrap">
        ${imageMarkup(product)}
      </div>

      <div class="product-info">
        <div class="product-category">${escapeHTML(product.category)}</div>
        <div class="product-name-sm">${escapeHTML(product.name)}</div>

        <div class="product-footer">
          <div class="product-price">${formatPrice(product.price)}</div>
          <button class="add-btn" type="button" onclick="event.stopPropagation();addToCart(${product.id})">+ Panier</button>
        </div>
      </div>
    </article>
  `).join('');
}

window.setMainProductImage = function(src, activeIndex) {
  const mainImage = document.getElementById('mainProductImage');
  if (mainImage) mainImage.src = src;

  document.querySelectorAll('.thumb').forEach((thumb, index) => {
    thumb.classList.toggle('active', index === activeIndex);
  });
};

window.toggleAccordion = function(button) {
  const body = button.nextElementSibling;
  const isOpen = button.classList.contains('open');

  button.classList.toggle('open', !isOpen);
  body.style.maxHeight = isOpen ? '0' : `${body.scrollHeight}px`;
};

window.addToCart = async function(productId) {
  const id = Number(productId);
  let product = allProducts.find(item => Number(item.id) === id);

  if (!product && currentProduct && Number(currentProduct.id) === id) {
    product = currentProduct;
  }

  if (!product) {
    product = await fetchProductById(id);
  }

  if (!product) return;

  const existing = cart.find(item => Number(item.id) === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  saveCart();
  updateCartUI();
  showToast(`${product.name} added to cart`);
};

window.removeFromCart = function(id) {
  cart = cart.filter(item => Number(item.id) !== Number(id));
  saveCart();
  updateCartUI();
};

window.changeQty = function(id, delta) {
  const item = cart.find(product => Number(product.id) === Number(id));
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    removeFromCart(id);
  } else {
    saveCart();
    updateCartUI();
  }
};

function updateCartUI() {
  const total = cart.reduce((sum, item) => sum + Number(item.price) * Number(item.qty), 0);
  const count = cart.reduce((sum, item) => sum + Number(item.qty), 0);

  const badge = document.getElementById('cartBadge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }

  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');
  const totalEl = document.getElementById('cartTotal');

  if (!itemsEl) return;

  if (!cart.length) {
    itemsEl.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <p>Your cart is empty.</p>
      </div>
    `;

    if (footerEl) footerEl.style.display = 'none';
    return;
  }

  itemsEl.innerHTML = cart.map(item => {
    const image = item.images?.[0] || item.imageUrl;

    return `
      <div class="cart-item">
        <div class="cart-item-img">
          ${image ? `<img src="${escapeHTML(image)}" alt="${escapeHTML(item.name)}">` : '❄️'}
        </div>

        <div class="cart-item-info">
          <div class="cart-item-name">${escapeHTML(item.name)}</div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>

          <div class="cart-item-controls">
            <button class="qty-btn" type="button" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" type="button" onclick="changeQty(${item.id}, 1)">+</button>
            <button class="cart-item-remove" type="button" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  if (totalEl) totalEl.textContent = formatPrice(total);
  if (footerEl) footerEl.style.display = 'block';
}

window.toggleCart = function() {
  document.getElementById('cartDrawer')?.classList.toggle('open');
  document.getElementById('cartOverlay')?.classList.toggle('open');
};

window.showToast = function(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;

  toast.textContent = message;
  toast.classList.add('show');

  setTimeout(() => toast.classList.remove('show'), 2800);
};

async function initProductPage() {
  const params = new URLSearchParams(window.location.search);
  const id = Number(params.get('id'));
  const layout = document.getElementById('productLayout');

  if (!id) {
    layout.innerHTML = `<div class="error-state">Product not found.</div>`;
    updateCartUI();
    return;
  }

  const product = await fetchProductById(id);

  if (!product) {
    layout.innerHTML = `<div class="error-state">Product not found.</div>`;
    updateCartUI();
    return;
  }

  allProducts = await fetchAllProducts();

  renderProduct(product);
  renderRelatedProducts(allProducts, product.id);
  updateCartUI();
}

document.addEventListener('DOMContentLoaded', initProductPage);
</script>
</body>
</html>
