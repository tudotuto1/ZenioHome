<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit — Zenio Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1A3050; --navy-dark: #0F1D32; --navy-light: #2C4B78;
  --copper-accent: #B07D62; --copper-pale: #F0E6E0;
  --cream: #F2EFEA; --warm-gray: #E8E4DE;
  --mid-gray: #9a9390; --light-text: #6b6460; --white: #FDFCFB;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: var(--white); color: var(--navy-dark); font-weight: 300; overflow-x: hidden; }

/* NAV */
nav { position: sticky; top: 0; z-index: 100; background: rgba(253,252,251,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--warm-gray); padding: 0 60px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--navy-dark); text-decoration: none; }
.nav-logo span { color: var(--copper-accent); font-style: italic; }
.nav-links { display: flex; gap: 36px; align-items: center; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--navy); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--copper-accent); }
.nav-right { display: flex; align-items: center; gap: 20px; }
.nav-cart { position: relative; cursor: pointer; font-size: 20px; color: var(--navy-dark); background: none; border: none; }
.cart-badge { position: absolute; top: -8px; right: -10px; background: var(--copper-accent); color: white; font-size: 10px; font-family: 'Jost', sans-serif; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

/* BREADCRUMB */
.breadcrumb-bar { padding: 20px 60px; border-bottom: 1px solid var(--warm-gray); background: var(--cream); }
.breadcrumb { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid-gray); }
.breadcrumb a { color: var(--mid-gray); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--copper-accent); }
.breadcrumb span { color: var(--navy-dark); }

/* PRODUCT LAYOUT */
.product-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  max-width: 1400px;
  margin: 0 auto;
}

/* GALLERY */
.product-gallery { padding: 60px 60px 60px 60px; position: sticky; top: 80px; height: fit-content; }
.main-img-wrap {
  position: relative;
  aspect-ratio: 1; margin-bottom: 16px;
  border-radius: 3px; overflow: hidden;
  background: var(--cream);
}
.main-img-wrap img, .main-img-placeholder {
  width: 100%; height: 100%;
  object-fit: cover; border-radius: 3px;
  transition: opacity 0.3s;
}
.main-img-placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 100px;
  background: linear-gradient(135deg, var(--cream) 0%, var(--warm-gray) 100%);
}
.gallery-thumbnails { display: flex; gap: 10px; }
.thumb {
  width: 80px; height: 80px;
  border-radius: 2px; overflow: hidden;
  border: 2px solid transparent; cursor: pointer;
  transition: border-color 0.2s;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  /* Pour de vraies images: background: var(--cream); */
}
.thumb.active { border-color: var(--navy); }
.thumb:hover { border-color: var(--copper-accent); }
.product-tag-large {
  position: absolute; top: 18px; left: 18px;
  background: var(--copper-accent); color: white;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 1px;
}

/* PRODUCT INFO */
.product-info-panel { padding: 60px 60px 60px 48px; border-left: 1px solid var(--warm-gray); }
.product-cat-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--copper-accent); margin-bottom: 12px; }
.product-name-large {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 3.5vw, 46px); font-weight: 300;
  color: var(--navy-dark); line-height: 1.1; margin-bottom: 16px;
}
.product-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.stars-lg { color: var(--copper-accent); font-size: 16px; }
.rating-text { font-size: 13px; color: var(--light-text); }

.price-block { margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid var(--warm-gray); }
.price-main { font-family: 'Cormorant Garamond', serif; font-size: 38px; color: var(--navy-dark); }
.price-old { font-size: 18px; color: var(--mid-gray); text-decoration: line-through; margin-right: 10px; }
.price-save { font-size: 12px; color: #2e7d32; background: #e8f5e9; padding: 3px 9px; border-radius: 2px; margin-left: 10px; }

.product-short-desc { font-size: 14px; line-height: 1.8; color: var(--light-text); margin-bottom: 28px; }

/* VARIANTS */
.variant-section { margin-bottom: 24px; }
.variant-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--navy-dark); margin-bottom: 10px; }
.color-options { display: flex; gap: 10px; }
.color-dot {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: all 0.2s;
}
.color-dot.active, .color-dot:hover { border-color: var(--navy); transform: scale(1.1); }

/* ADD TO CART */
.add-to-cart-block { margin-bottom: 24px; }
.qty-selector { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.qty-selector-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--light-text); }
.qty-controls { display: flex; align-items: center; gap: 0; border: 1px solid var(--warm-gray); border-radius: 2px; overflow: hidden; }
.qty-ctrl-btn {
  background: none; border: none; width: 38px; height: 38px;
  cursor: pointer; font-size: 18px; color: var(--navy-dark);
  transition: background 0.15s; display: flex; align-items: center; justify-content: center;
}
.qty-ctrl-btn:hover { background: var(--cream); }
.qty-val { width: 44px; text-align: center; font-size: 15px; border-left: 1px solid var(--warm-gray); border-right: 1px solid var(--warm-gray); height: 38px; display: flex; align-items: center; justify-content: center; }

.btn-add-cart {
  width: 100%;
  background: var(--navy); color: white; border: none;
  padding: 17px; font-family: 'Jost', sans-serif;
  font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: background 0.25s;
  margin-bottom: 12px;
}
.btn-add-cart:hover { background: var(--copper-accent); }
.btn-wishlist {
  width: 100%; background: none;
  border: 1px solid var(--warm-gray); color: var(--navy-dark);
  padding: 14px; font-family: 'Jost', sans-serif;
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: all 0.25s;
}
.btn-wishlist:hover { border-color: var(--copper-accent); color: var(--copper-accent); }

/* DELIVERY INFO */
.delivery-info { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; padding: 20px; background: var(--cream); border-radius: 3px; }
.delivery-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--light-text); }
.delivery-icon { font-size: 16px; }

/* ACCORDION */
.accordion { border-top: 1px solid var(--warm-gray); }
.accordion-item { border-bottom: 1px solid var(--warm-gray); }
.accordion-btn {
  width: 100%; background: none; border: none; padding: 18px 0;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; font-family: 'Jost', sans-serif;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--navy-dark); transition: color 0.2s;
}
.accordion-btn:hover { color: var(--copper-accent); }
.accordion-btn .icon { font-size: 18px; transition: transform 0.25s; }
.accordion-btn.open .icon { transform: rotate(45deg); }
.accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.accordion-body-inner { padding: 0 0 20px; font-size: 13px; line-height: 1.9; color: var(--light-text); }
.accordion-body-inner ul { padding-left: 16px; }
.accordion-body-inner li { margin-bottom: 6px; }

/* RELATED */
.related-section { padding: 80px 60px; background: var(--cream); border-top: 1px solid var(--warm-gray); }
.section-eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--copper-accent); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.section-eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--copper-accent); display: block; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--navy-dark); margin-bottom: 40px; }
.related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.product-card { background: var(--white); border-radius: 3px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(15,29,50,0.09); }
.product-img-wrap { position: relative; overflow: hidden; aspect-ratio: 1; }
.product-img-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--cream), var(--warm-gray)); display: flex; align-items: center; justify-content: center; font-size: 48px; transition: transform 0.4s; }
.product-card:hover .product-img-placeholder { transform: scale(1.05); }
.product-info { padding: 16px; }
.product-category { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 4px; }
.product-name-sm { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--navy-dark); margin-bottom: 10px; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--navy-dark); }
.add-btn { background: var(--navy); border: none; color: white; font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
.add-btn:hover { background: var(--copper-accent); }

/* CART DRAWER */
.cart-overlay { position: fixed; inset: 0; background: rgba(15,29,50,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; background: var(--white); z-index: 301; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
.cart-drawer.open { transform: translateX(0); }
.cart-header { padding: 32px 32px 24px; border-bottom: 1px solid var(--warm-gray); display: flex; align-items: center; justify-content: space-between; }
.cart-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; }
.cart-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--mid-gray); }
.cart-items { flex: 1; overflow-y: auto; padding: 24px 32px; }
.cart-empty { text-align: center; padding: 60px 20px; color: var(--light-text); }
.cart-empty-icon { font-size: 48px; margin-bottom: 16px; }
.cart-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--warm-gray); }
.cart-item-img { width: 72px; height: 72px; background: var(--cream); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; margin-bottom: 4px; }
.cart-item-price { font-size: 14px; color: var(--light-text); }
.cart-item-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.qty-btn { background: none; border: 1px solid var(--warm-gray); width: 26px; height: 26px; border-radius: 2px; cursor: pointer; font-size: 16px; color: var(--navy-dark); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.qty-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
.qty-num { font-size: 14px; min-width: 20px; text-align: center; }
.cart-item-remove { background: none; border: none; color: var(--mid-gray); cursor: pointer; font-size: 12px; margin-left: auto; transition: color 0.2s; }
.cart-item-remove:hover { color: #c0392b; }
.cart-footer { padding: 24px 32px 32px; border-top: 1px solid var(--warm-gray); }
.cart-subtotal { display: flex; justify-content: space-between; margin-bottom: 20px; }
.cart-subtotal span:first-child { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--light-text); }
.cart-subtotal span:last-child { font-family: 'Cormorant Garamond', serif; font-size: 22px; }
.cart-checkout { width: 100%; background: var(--navy); color: white; border: none; padding: 16px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
.cart-checkout:hover { background: var(--copper-accent); }
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--navy-dark); color: var(--white); padding: 14px 24px; border-left: 3px solid var(--copper-accent); opacity: 0; transform: translateY(8px); transition: 0.3s; z-index: 400; font-size: 13px; }
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 900px) {
  nav { padding: 0 20px; }
  .product-layout { grid-template-columns: 1fr; }
  .product-gallery { position: static; padding: 32px 20px; }
  .product-info-panel { padding: 32px 20px; border-left: none; border-top: 1px solid var(--warm-gray); }
  .related-grid { grid-template-columns: repeat(2, 1fr); }
  .cart-drawer { width: 100%; }
  .breadcrumb-bar { padding: 16px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Zenio <span>Home</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="catalogue.html">Catalogue</a></li>
    <li><a href="catalogue.html?cat=nouveautes">Nouveautés</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-cart" onclick="toggleCart()">🛒 <span class="cart-badge" id="cartBadge">0</span></button>
  </div>
</nav>

<div class="breadcrumb-bar">
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">Accueil</a> / <a href="catalogue.html">Catalogue</a> / <span id="breadcrumbName">Produit</span>
  </div>
</div>

<div class="product-layout" id="productLayout">
  <!-- Généré via JS -->
</div>

<section class="related-section">
  <div class="section-eyebrow">Vous aimerez aussi</div>
  <div class="section-title">Produits similaires</div>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header"><div class="cart-title">Mon Panier</div><button class="cart-close" onclick="toggleCart()">✕</button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Votre panier est vide.</p></div></div>
  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-subtotal"><span>Sous-total</span><span id="cartTotal">0,00 €</span></div>
    <button class="cart-checkout" onclick="showToast('Redirection vers le paiement…')">Passer la commande</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ALL_PRODUCTS = [
  { id: 1,  name: "Thermomètre Smart",         cat: "Maison connectée", catSlug: "maison-connectee", price: 34.99, oldPrice: null,   tag: null,      emoji: "🌡️", desc: "Suivi simultané de la température et de l'humidité avec synchronisation en temps réel sur votre smartphone. Historique 30 jours, alertes configurables.", specs: ["Plage temp.: -10°C à +60°C","Humidité: 0-99% HR","Portée Bluetooth: 50m","Batterie: CR2032, 12 mois","App iOS & Android"], isNew: false, rating: 4.8, reviews: 127 },
  { id: 2,  name: "Ampoule LED RGB",            cat: "Éclairage",        catSlug: "eclairage",        price: 19.99, oldPrice: 24.99,  tag: "Promo",   emoji: "💡", desc: "16 millions de couleurs, synchronisation musicale, scènes d'ambiance préprogrammées. Compatible Alexa, Google Home et Apple HomeKit.", specs: ["Culot E27","Puissance équivalente: 60W","Consommation: 9W","Durée de vie: 25 000h","Compatible Matter"], isNew: false, rating: 4.6, reviews: 89 },
  { id: 3,  name: "Mini Aspirateur Bureau",     cat: "Bureau",           catSlug: "bureau",           price: 27.99, oldPrice: null,   tag: null,      emoji: "🧹", desc: "Aspiration puissante en format compact pour votre bureau. Recharge USB-C en 2h, autonomie 40 minutes, niveau sonore 58dB seulement.", specs: ["Aspiration: 8000Pa","Autonomie: 40min","Recharge: USB-C, 2h","Contenance: 180ml","Poids: 380g"], isNew: false, rating: 4.4, reviews: 54 },
  { id: 4,  name: "Capteur Humidité Plante",    cat: "Bien-être",        catSlug: "bien-etre",        price: 14.99, oldPrice: null,   tag: "Nouveau", emoji: "🌿", desc: "Surveillez le niveau d'humidité de vos plantes depuis votre téléphone. Alerte instantanée quand votre plante a soif. Résistant à l'eau IP65.", specs: ["Profondeur mesure: 0-100%","Autonomie: 6 mois","Bluetooth 5.0","IP65 résistant","App notifications push"], isNew: true, rating: 4.7, reviews: 41 },
  { id: 5,  name: "Diffuseur Mag-Lev",          cat: "Bien-être",        catSlug: "bien-etre",        price: 89.99, oldPrice: null,   tag: "Nouveau", emoji: "🌀", desc: "Diffuseur d'huiles essentielles par lévitation magnétique. La sphère flotte et tourne silencieusement. Brumisation ultrasonique 30ml/h.", specs: ["Technologie magnétique","Débit: 30ml/h","Niveau sonore: <25dB","Surface: 40m²","Minuterie 1h/3h/auto"], isNew: true, rating: 4.9, reviews: 23 },
  { id: 6,  name: "Prise Connectée",            cat: "Maison connectée", catSlug: "maison-connectee", price: 22.99, oldPrice: 29.99,  tag: "Promo",   emoji: "🔌", desc: "Contrôlez n'importe quel appareil à distance, programmez des horaires et mesurez votre consommation électrique en temps réel.", specs: ["Charge max: 16A / 3680W","Wi-Fi 2.4GHz","Mesure énergie","Compteur kWh","Compatible IFTTT"], isNew: false, rating: 4.5, reviews: 203 },
  { id: 7,  name: "Lampe de Bureau LED",        cat: "Éclairage",        catSlug: "eclairage",        price: 49.99, oldPrice: null,   tag: null,      emoji: "🔦", desc: "Lumière adaptative selon l'heure et la lumière ambiante. Chargeur Qi intégré 10W. Bras articulé 360°. Idéale pour le travail et la lecture.", specs: ["Luminosité: 700lm max","Temp. couleur: 2700-6500K","Chargeur Qi 10W","Bras articulé 360°","Mode veille automatique"], isNew: false, rating: 4.7, reviews: 76 },
  { id: 8,  name: "Balance Cuisine Smart",      cat: "Cuisine",          catSlug: "cuisine",          price: 39.99, oldPrice: null,   tag: null,      emoji: "⚖️", desc: "Précision au gramme près, connexion Bluetooth à l'app de recettes. Calcul nutritionnel automatique, base de données de 400 000 aliments.", specs: ["Capacité max: 5kg","Précision: 1g","Bluetooth 5.0","App iOS & Android","Surface verre trempé"], isNew: false, rating: 4.6, reviews: 58 },
  { id: 9,  name: "Détecteur de Fumée WiFi",    cat: "Maison connectée", catSlug: "maison-connectee", price: 44.99, oldPrice: null,   tag: "Nouveau", emoji: "🔥", desc: "Alerte instantanée sur votre smartphone en cas de fumée ou de CO. Batterie 10 ans, test automatique hebdomadaire, interconnecté.", specs: ["Batterie: 10 ans","Wi-Fi 2.4GHz","Détection CO","Test auto hebdo","Interconnectable x10"], isNew: true, rating: 4.8, reviews: 35 },
  { id: 10, name: "Caméra Intérieure 1080p",    cat: "Maison connectée", catSlug: "maison-connectee", price: 59.99, oldPrice: 74.99,  tag: "Promo",   emoji: "📷", desc: "Surveillance HD 1080p avec vision nocturne infrarouge 10m, détection de mouvement intelligente, stockage cloud ou micro SD.", specs: ["Résolution: 1920×1080","Vision nocturne: 10m","Angle: 130°","Stockage: Cloud/MicroSD","Détection IA"], isNew: false, rating: 4.5, reviews: 112 },
];

const urlParams = new URLSearchParams(window.location.search);
const productId = parseInt(urlParams.get('id')) || 1;
const product = ALL_PRODUCTS.find(p => p.id === productId) || ALL_PRODUCTS[0];

let qty = 1;
let cart = JSON.parse(localStorage.getItem('zenio_cart') || '[]');

// Render product
document.getElementById('breadcrumbName').textContent = product.name;
document.title = product.name + ' — Zenio Home';

document.getElementById('productLayout').innerHTML = `
  <div class="product-gallery">
    <div class="main-img-wrap">
      ${product.tag ? `<span class="product-tag-large">${product.tag}</span>` : ''}
      <!-- REMPLACER par: <img src="images/product-${product.id}-main.jpg" alt="${product.name}" id="mainImg"> -->
      <div class="main-img-placeholder">${product.emoji}</div>
    </div>
    <div class="gallery-thumbnails">
      <!-- Pour de vraies images, ajouter vos thumbs ici -->
      <div class="thumb active">${product.emoji}</div>
      <div class="thumb" style="font-size:22px;color:var(--mid-gray);">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect x="4" y="8" width="32" height="26" rx="2" stroke="#9a9390" stroke-width="1.5"/><circle cx="14" cy="18" r="4" stroke="#9a9390" stroke-width="1.5"/><path d="M4 28l8-6 6 5 6-8 12 9" stroke="#9a9390" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="thumb" style="font-size:22px;color:var(--mid-gray);">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect x="4" y="8" width="32" height="26" rx="2" stroke="#9a9390" stroke-width="1.5"/><circle cx="14" cy="18" r="4" stroke="#9a9390" stroke-width="1.5"/><path d="M4 28l8-6 6 5 6-8 12 9" stroke="#9a9390" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="thumb" style="font-size:22px;color:var(--mid-gray);">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect x="4" y="8" width="32" height="26" rx="2" stroke="#9a9390" stroke-width="1.5"/><circle cx="14" cy="18" r="4" stroke="#9a9390" stroke-width="1.5"/><path d="M4 28l8-6 6 5 6-8 12 9" stroke="#9a9390" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <div class="product-info-panel">
    <div class="product-cat-label">${product.cat}</div>
    <div class="product-name-large">${product.name}</div>
    <div class="product-rating">
      <div class="stars-lg">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5-Math.floor(product.rating))}</div>
      <div class="rating-text">${product.rating}/5 · ${product.reviews} avis</div>
    </div>

    <div class="price-block">
      <div class="price-main">
        ${product.oldPrice ? `<span class="price-old">${product.oldPrice.toFixed(2).replace('.',',')} €</span>` : ''}
        ${product.price.toFixed(2).replace('.',',')} €
        ${product.oldPrice ? `<span class="price-save">−${Math.round((1-product.price/product.oldPrice)*100)}%</span>` : ''}
      </div>
    </div>

    <p class="product-short-desc">${product.desc}</p>

    <div class="add-to-cart-block">
      <div class="qty-selector">
        <span class="qty-selector-label">Quantité</span>
        <div class="qty-controls">
          <button class="qty-ctrl-btn" onclick="changeQtyLocal(-1)">−</button>
          <div class="qty-val" id="qtyDisplay">1</div>
          <button class="qty-ctrl-btn" onclick="changeQtyLocal(1)">+</button>
        </div>
      </div>
      <button class="btn-add-cart" onclick="addToCartLocal()">Ajouter au panier</button>
      <button class="btn-wishlist" onclick="showToast('Ajouté aux favoris ♥')">♡ Ajouter aux favoris</button>
    </div>

    <div class="delivery-info">
      <div class="delivery-row"><span class="delivery-icon">🚚</span> Livraison gratuite dès 60€ — 2 à 4 jours ouvrés</div>
      <div class="delivery-row"><span class="delivery-icon">↩️</span> Retours gratuits sous 30 jours</div>
      <div class="delivery-row"><span class="delivery-icon">🔒</span> Paiement 100% sécurisé SSL</div>
    </div>

    <div class="accordion">
      <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">
          Caractéristiques techniques <span class="icon">+</span>
        </button>
        <div class="accordion-body">
          <div class="accordion-body-inner">
            <ul>${product.specs.map(s => `<li>${s}</li>`).join('')}</ul>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">
          Livraison & Retours <span class="icon">+</span>
        </button>
        <div class="accordion-body">
          <div class="accordion-body-inner">
            <p>Livraison standard (2-4j) offerte dès 60€. Livraison express (24h) disponible à 5,90€. Retours acceptés sous 30 jours dans leur emballage d'origine. Remboursement sous 5 jours ouvrés.</p>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">
          Garantie & SAV <span class="icon">+</span>
        </button>
        <div class="accordion-body">
          <div class="accordion-body-inner">
            <p>Tous nos produits sont garantis 2 ans. Notre support technique est disponible 7j/7 via chat, email ou téléphone. En cas de défaut, nous échangeons ou remboursons sans frais.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
`;

// Related products
const related = ALL_PRODUCTS.filter(p => p.id !== product.id && p.catSlug === product.catSlug).slice(0, 4);
const fallback = ALL_PRODUCTS.filter(p => p.id !== product.id).slice(0, 4 - related.length);
const relatedAll = [...related, ...fallback].slice(0, 4);

document.getElementById('relatedGrid').innerHTML = relatedAll.map(p => `
  <div class="product-card" onclick="window.location='produit.html?id=${p.id}'">
    <div class="product-img-wrap">
      <div class="product-img-placeholder">${p.emoji}</div>
    </div>
    <div class="product-info">
      <div class="product-category">${p.cat}</div>
      <div class="product-name-sm">${p.name}</div>
      <div class="product-footer">
        <div class="product-price">${p.price.toFixed(2).replace('.',',')} €</div>
        <button class="add-btn" onclick="event.stopPropagation();addToCartDirect(${p.id})">+ Panier</button>
      </div>
    </div>
  </div>
`).join('');

// ACCORDION
function toggleAccordion(btn) {
  const body = btn.nextElementSibling;
  const isOpen = btn.classList.contains('open');
  document.querySelectorAll('.accordion-btn.open').forEach(b => {
    b.classList.remove('open');
    b.nextElementSibling.style.maxHeight = '0';
  });
  if (!isOpen) {
    btn.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}

// QTY LOCAL
function changeQtyLocal(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('qtyDisplay').textContent = qty;
}

function addToCartLocal() {
  const existing = cart.find(x => x.id === product.id);
  if (existing) existing.qty += qty;
  else cart.push({ ...product, qty });
  saveCart(); updateCartUI();
  showToast(`${product.name} (×${qty}) ajouté au panier ✓`);
  toggleCart();
}

function addToCartDirect(id) {
  const p = ALL_PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  saveCart(); updateCartUI();
  showToast(p.name + ' ajouté au panier ✓');
}

// CART
function saveCart() { localStorage.setItem('zenio_cart', JSON.stringify(cart)); }
function removeFromCart(id) { cart = cart.filter(x => x.id !== id); saveCart(); updateCartUI(); }
function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else { saveCart(); updateCartUI(); }
}
function updateCartUI() {
  const total = cart.reduce((s,i) => s+i.price*i.qty, 0);
  const count = cart.reduce((s,i) => s+i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none';
  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');
  if (cart.length === 0) {
    itemsEl.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Votre panier est vide.</p></div>`;
    footerEl.style.display = 'none';
  } else {
    itemsEl.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-img">${item.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${item.price.toFixed(2).replace('.',',')} €</div>
          <div class="cart-item-controls">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">Retirer</button>
          </div>
        </div>
      </div>
    `).join('');
    document.getElementById('cartTotal').textContent = total.toFixed(2).replace('.',',') + ' €';
    footerEl.style.display = 'block';
  }
}
function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

updateCartUI();
</script>
</body>
</html>
